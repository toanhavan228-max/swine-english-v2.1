<script>
const WEEKS = [{"week":1,"title":"Giải Phẫu Học Heo","color":"#C8761A","days":[{"day":1,"title":"Tổng quan về heo","tag":"Swine Overview","reading":"Domestic pigs (Sus scrofa domesticus) provide approximately 38% of the world meat supply. Swine production systems range from small backyard farms to large commercial operations with thousands of animals. The industry uses precise terminology: boars (intact males), sows (females that have farrowed), gilts (females not yet farrowed), barrows (castrated males), and piglets (neonates to weaning). Mastery of this vocabulary is the foundation of professional communication in swine veterinary practice.","exercise":{"type":"writing","prompt":"Write 4–5 sentences in English describing the different classes of pigs on a commercial farm. Use the words: boar, sow, gilt, barrow, piglet, herd."}},{"day":2,"title":"Hệ Tiêu Hóa","tag":"Digestive System","reading":"Pigs are monogastric omnivores with a gastrointestinal tract functionally similar to humans. The tract spans approximately 18–20 meters and includes the stomach (6–8 L capacity), small intestine (duodenum, jejunum, ileum — the primary site of nutrient absorption), and large intestine (cecum, colon, rectum). Millions of intestinal villi increase the absorptive surface area enormously. Peristalsis moves ingesta through the tract via coordinated smooth muscle contractions. Understanding this anatomy is essential for diagnosing enteric diseases.","exercise":{"type":"speaking","prompt":"Describe the pathway of a feed particle from the mouth to the rectum in English. Use transition words: first, then, next, following this, finally."}},{"day":3,"title":"Hệ Hô Hấp & Tim Mạch","tag":"Thoracic Anatomy","reading":"The swine respiratory system comprises the upper tract (nasal cavity, pharynx, larynx, trachea) and lower tract (bronchi, bronchioles, alveoli). Pigs have lobulated lungs with seven lobes. Gas exchange occurs across thin alveolar walls. The four-chambered heart pumps blood through pulmonary circulation (to lungs) and systemic circulation (to body). The diaphragm is the primary inspiratory muscle. Post-mortem knowledge of thoracic anatomy is essential for interpreting lesions in PRRS, Mycoplasma, and Actinobacillus pleuropneumonia infections.","exercise":{"type":"writing","prompt":"Write a post-mortem report describing: bilateral cranioventral lung consolidation, pericarditis, and fibrinous pleuritis. Use correct anatomical terminology."}},{"day":4,"title":"Hệ Cơ Xương & Da","tag":"Musculoskeletal","reading":"Lameness is one of the most economically important welfare conditions in commercial swine, particularly in breeding herds. Osteochondrosis (OC) — a failure of endochondral ossification — is the leading cause, most commonly affecting the distal femur and tibial plateau. The integumentary system (skin, hair, hooves) serves as the body's first physical defense against pathogens and provides critical diagnostic clues: diamond-shaped skin lesions indicate erysipelas; alopecia and pruritus suggest mange. Leg conformation scoring is routinely performed in gilt selection programs.","exercise":{"type":"writing","prompt":"Write a lameness examination report in English for a breeding sow with suspected osteochondrosis. Include: signalment, clinical signs, affected limb, severity (mild/moderate/severe), and your recommendation."}},{"day":5,"title":"Hệ Sinh Sản","tag":"Reproductive System","reading":"The sow's bicornuate uterus has two uterine horns (1.0–1.5 m each) capable of carrying 10–16 fetuses. The pig cervix is anatomically unique — interlocking folds accommodate the corkscrew-shaped glans penis rather than a discrete cervical os. The corpus luteum secretes progesterone to maintain pregnancy. The boar's reproductive system includes the testes, epididymides, seminal vesicles (contributing most ejaculate volume), and penis. A single ejaculate contains 150–300 mL with 20–100 billion sperm. This anatomy underpins AI technique and reproductive examination.","exercise":{"type":"speaking","prompt":"Explain to a new farm worker why visual examination of the vulva is important for detecting estrus. Speak for 1 minute in English."}},{"day":6,"title":"Hệ Thần Kinh & Tiết Niệu","tag":"Neurology & Nephrology","reading":"Neurological diseases in swine range from bacterial meningitis (Streptococcus suis — the leading cause in post-weaning pigs) to viral encephalitis and nutritional toxicities (salt poisoning). Clinical signs include ataxia, paddling, nystagmus, opisthotonus, and sudden death. The urinary system consists of multipapillate kidneys, ureters, bladder, and urethra. Urinary tract infections are common in sows post-farrowing and can ascend to cause pyelonephritis if untreated. Regular monitoring of urine pH and color provides early warning of urinary tract disease.","exercise":{"type":"writing","prompt":"Create a differential diagnosis list in English for a 6-week-old piglet showing sudden-onset ataxia, tremors, and lateral recumbency. Include at least 4 diseases with one diagnostic test for each."}},{"day":7,"title":"Ôn Tập Tuần 1 — Giải Phẫu","tag":"Week 1 Review","reading":"A systematic post-mortem examination (necropsy) is the most diagnostically powerful tool available to swine practitioners. Follow a consistent sequence: external examination → thoracic cavity (lungs, heart, pericardium) → abdominal cavity (liver, spleen, intestines, kidneys, reproductive tract) → nervous system (brain, spinal cord). Use precise anatomical terminology when describing lesions: bilateral/unilateral, cranial/caudal, dorsal/ventral. This precision ensures accurate communication with diagnostic laboratories and enables meaningful comparison of cases. Collect samples for histopathology (10% formalin), microbiology (fresh tissue, chilled), virology (fresh tissue, frozen), and serology (serum).","exercise":{"type":"writing","prompt":"Write a complete necropsy report summary in English for a 10-week-old piglet with: bilateral cranioventral lung consolidation (50% of lung affected), pericarditis with straw-colored fluid, and mesenteric lymphadenopathy. Include gross findings, differential diagnoses, and samples collected."}}]},{"week":2,"title":"Dinh Dưỡng & Thức Ăn","color":"#6B8C5A","days":[{"day":8,"title":"Năng Lượng & Macronutrients","tag":"Energy Nutrition","reading":"Energy is the primary nutrient driving feed intake — pigs eat to satisfy their energy requirements. Metabolizable energy (ME) is the most commonly used energy system in practical swine nutrition. Modern grow-finish pigs should achieve a feed conversion ratio (FCR) of 2.4–2.8, meaning 2.4–2.8 kg feed per kg gain. When FCR exceeds 2.8, investigate: disease burden, feeder adjustment, diet formulation errors, or water supply problems. All nutrient concentrations are expressed on a dry matter basis. Proximate analysis (the Weende system) determines moisture, crude protein, crude fiber, ether extract (fat), and ash content.","exercise":{"type":"writing","prompt":"A farm reports a grower FCR of 3.4 (target: 2.6). Write a systematic investigation plan in English listing 5 possible causes and the corrective action for each."}},{"day":9,"title":"Amino Acids & Protein","tag":"Amino Acid Nutrition","reading":"Modern swine nutrition has moved beyond crude protein to individual amino acid requirements. Lysine is the universally recognized first limiting amino acid in corn-soybean meal diets — all other essential amino acids are expressed as ratios to lysine (the ideal protein concept). Standardized ileal digestibility (SID) values account for digestibility differences between ingredients and form the basis for modern diet formulation. Synthetic amino acids (L-lysine HCl, DL-methionine, L-threonine, L-tryptophan) allow reduction of dietary crude protein by 2–4 percentage points while maintaining performance — reducing nitrogen excretion and feed cost.","exercise":{"type":"writing","prompt":"Explain to a feed mill nutritionist why reducing crude protein from 18% to 15% while adding synthetic amino acids can save cost without reducing pig performance. Write 5–6 sentences in technical English."}},{"day":10,"title":"Vitamins & Minerals","tag":"Micronutrients","reading":"Vitamin E and selenium work synergistically as antioxidants protecting cell membranes. Deficiency causes mulberry heart disease (myocardial degeneration) and white muscle disease. Iron deficiency anemia is common in neonatal piglets because sow's milk is iron-poor and piglets are born with minimal iron stores. Standard practice: administer 200 mg iron dextran IM at 2–3 days of age. Phytase supplementation releases phytate-bound phosphorus from plant ingredients, reducing inorganic phosphate supplementation needs by up to 30% and lowering feed cost and environmental phosphorus load.","exercise":{"type":"writing","prompt":"A 5-day-old piglet presents pale, weak, dyspneic, and tachycardic. Write a diagnostic workup and treatment plan in English including drug name, dose, route, and prevention strategy."}},{"day":11,"title":"Nguyên Liệu & Phối Trộn","tag":"Diet Formulation","reading":"Swine diets are formulated using linear programming to minimize cost while meeting all nutrient constraints. Corn-soybean meal (SBM) is the global standard base diet. Distillers dried grains with solubles (DDGS) can replace 15–20% of the corn-SBM diet as a cost-effective energy-protein ingredient. Fishmeal (65–72% crude protein) improves palatability and amino acid balance in starter diets. Anti-nutritional factors (ANFs) — trypsin inhibitors, lectins, phytate in soybeans — are destroyed by proper heat processing (toasting). Pelleting improves FCR by 5–10% versus mash by improving ingredient mixing uniformity and reducing feed wastage.","exercise":{"type":"writing","prompt":"Write a complete grow-finish diet specification in English: list 5 ingredients with approximate inclusion rates (%) and justify the nutritional role of each ingredient."}},{"day":12,"title":"Chương Trình Cho Ăn Theo Giai Đoạn","tag":"Phase Feeding","reading":"Phase feeding matches nutrient density to the pig's changing requirements at different life stages, optimizing performance and minimizing cost. Lactating sows are fed ad libitum with a high-energy (3,300+ kcal ME/kg), high-lysine (1.0% SID lysine) diet to maximize milk production and minimize body weight loss — losses exceeding 15% of bodyweight delay return to estrus. Gestating sows are limit-fed 2.0–2.5 kg/day to maintain BCS 3.0–3.5. Overconditioned sows (BCS 4–5) have reduced feed intake during lactation and more farrowing complications. Creep feeding from day 7 improves weaning weight and reduces post-weaning growth check.","exercise":{"type":"speaking","prompt":"You are advising a farm manager on sow nutrition during gestation versus lactation. Explain the key differences in feeding strategy and why they matter for herd productivity. Speak 2 minutes in English."}},{"day":13,"title":"Nước Uống & Phụ Gia Thức Ăn","tag":"Water & Additives","reading":"Water is the most critical nutrient — restriction for even a few hours significantly reduces feed intake and growth. Lactating sows require 20–30 L/day. Inadequate nipple drinker flow rate is a common, underdiagnosed cause of poor performance. Feed additives have become critical as antibiotic growth promoters (AGPs) are phased out globally. High-dose zinc oxide (2,500–3,000 ppm) effectively controls post-weaning diarrhea but is restricted in the EU due to environmental zinc accumulation. Organic acids (fumaric, formic, lactic) acidify the stomach, reducing pathogen load and improving protein digestion. Probiotics (Lactobacillus, Bacillus) help stabilize the post-weaning microbiome.","exercise":{"type":"writing","prompt":"Design an antibiotic-free post-weaning program for a 500-sow farm. List 4 feed additives with: mode of action, target pathogen/mechanism, inclusion rate, and expected benefit."}},{"day":14,"title":"Mycotoxin & An Toàn Thức Ăn","tag":"Feed Safety","reading":"Mycotoxin contamination is a chronic challenge in tropical and subtropical swine production. Pigs are among the most sensitive livestock species. Aflatoxin B1 (Aspergillus) causes liver damage and immunosuppression — EU limit 10 ppb in complete feed. Zearalenone (Fusarium) mimics estrogen — the hallmark presentation is vulvovaginitis and vulvar prolapse in prepubertal gilts, often mistaken for early puberty. Deoxynivalenol (DON/vomitoxin) causes feed refusal and vomiting at concentrations above 1 ppm. Prevention: dry grain below 14% moisture, proper storage, regular mycotoxin testing by ELISA or HPLC.","exercise":{"type":"writing","prompt":"A group of 3-month-old gilts show vulvar swelling and mammary development. Write a diagnostic investigation in English including: differential diagnoses, samples to collect, laboratory tests, and prevention measures."}}]},{"week":3,"title":"Sinh Sản Heo","color":"#B84B1E","days":[{"day":15,"title":"Phát Hiện Động Dục & Phối Giống","tag":"Estrus Management","reading":"The standing reflex — the sow stands immobile when back pressure is applied in the presence of a boar — is the gold-standard indicator of primary estrus. Ovulation occurs 35–40 hours after onset of standing estrus, lasting approximately 30–50 hours. For AI programs: inseminate at 12–24 hours after detection of standing estrus with a second insemination 12–16 hours later. Daily boar-to-nose contact (minimum 10–15 minutes) is essential for estrus stimulation in gilts and for accurate post-weaning estrus detection. Target weaning-to-estrus interval (WEI) of 4–6 days — WEI exceeding 7 days reduces litter size and farrowing rate.","exercise":{"type":"speaking","prompt":"Explain the complete estrus detection and AI timing protocol to a new farm employee in English. Include: what signs to look for, when to check, how to confirm, and when to inseminate. Speak for 2 minutes."}},{"day":16,"title":"Thụ Tinh Nhân Tạo (AI)","tag":"Artificial Insemination","reading":"AI has transformed genetics in commercial swine production — over 90% of sows in intensive systems are inseminated by AI. Standard dose: 2.0–3.0 billion motile sperm in 80–100 mL extender. Quality criteria: motility ≥70% progressive, morphology ≥80% normal. For cervical AI (standard technique): insert foam-tip catheter counterclockwise through the vulva to engage the cervix; deposit semen slowly over 3–5 minutes. Post-cervical AI (PCAI) uses a smaller inner catheter to deposit semen directly into the uterine body — requires only 1 billion sperm per dose. Boar presence during AI increases oxytocin release, enhancing sperm transport by uterine contractions.","exercise":{"type":"writing","prompt":"Write a Standard Operating Procedure (SOP) in English for performing cervical AI in sows. Structure it with: Materials required, Pre-AI checks, AI procedure (step-by-step), Post-AI management, Records to complete."}},{"day":17,"title":"Chẩn Đoán Thai & Quản Lý Mang Thai","tag":"Pregnancy Management","reading":"Real-time ultrasonography can confirm pregnancy from day 21 (fluid-filled uterine horns visible). Natural embryonic mortality reduces litter size by 30–40% even in fertile sows — most losses occur during the critical implantation period (days 10–18). Sow body condition at farrowing should be BCS 3.0–3.5: thin sows (BCS 1–2) have poor colostrum production and high post-farrowing disease risk; overconditioned sows (BCS 4–5) have prolonged farrowing and more stillbirths. Transfer sows to farrowing crates 5–7 days pre-farrowing. Mummified fetuses (varying sizes) indicate fetal death after day 35, suggesting viral infection (PRRS, PPV, PCV2).","exercise":{"type":"writing","prompt":"Create a gestation management checklist in English with specific actions for: Week 1 (post-mating), Weeks 2–14 (mid-gestation), and Week 15–16 (pre-farrowing)."}},{"day":18,"title":"Quản Lý Đẻ (Farrowing)","tag":"Farrowing Management","reading":"The farrowing period carries the highest mortality risk in the entire production cycle. Pre-weaning mortality (PWM) averages 12–15% in commercial herds — 24-hour supervision reduces this by 3–5 percentage points. Piglets are born at 10–20 minute intervals; an interval exceeding 45 minutes warrants obstetrical assessment. Oxytocin (10–20 IU IM) can stimulate contractions but excessive use causes tetanic uterine contractions, placental ischemia, and stillbirths — use judiciously. All piglets must receive at least 200 mL colostrum within 6 hours of birth to absorb maternal immunoglobulins — this window closes rapidly as the intestinal epithelium matures.","exercise":{"type":"writing","prompt":"Write an emergency farrowing protocol in English for: a sow that has been in active stage-2 labor (active straining) for 45 minutes with no piglet delivered. Include: assessment, decision criteria for manual intervention, drugs to use (name, dose, route), and aftercare."}},{"day":19,"title":"Tiết Sữa & Cai Sữa","tag":"Lactation Management","reading":"Sow milk letdown lasts only 15–30 seconds but occurs every 40–60 minutes — piglets must be present and nursing continuously. Peak milk production (6–10 kg/day) occurs at 3–4 weeks post-farrowing. MMA syndrome (Mastitis-Metritis-Agalactia) causes agalactia within 12–72 hours of farrowing. Affected sows show fever (>39.5°C), reduced milk (confirmed by failure of piglets to nurse satisfactorily), vulvar discharge, and anorexia. Treatment: oxytocin (20 IU IM, repeat q4h) + broad-spectrum antibiotic (amoxicillin or ceftiofur) + meloxicam (0.4 mg/kg IM). Prevention: farrowing hygiene, constipation prevention, optimal body condition at farrowing.","exercise":{"type":"writing","prompt":"Write a complete treatment protocol in English for a sow with MMA syndrome. Include: diagnosis criteria, drug name, dose, route, frequency, duration, nursing care instructions, and follow-up monitoring."}},{"day":20,"title":"KPIs Sinh Sản & Hồ Sơ","tag":"Reproductive KPIs","reading":"Pigs weaned per sow per year (PSY) is the integrating KPI for sow productivity — it captures farrowing rate, litter size, and pre-weaning survival. Top-performing farms achieve PSY > 30, requiring: farrowing rate ≥88%, born alive ≥14, and PWM ≤10%. Non-productive sow days (NPSD) — days not pregnant or lactating — target is <30/year. High NPSD is caused by extended WEI, abortion, late pregnancy failure, or prolonged weaning-to-service interval. Monthly analysis should track: farrowing rate by service month, return rates by service week, abortion rate, and culling reasons — these trends identify emerging problems 60–90 days before they impact the bottom line.","exercise":{"type":"writing","prompt":"Calculate and analyze the following farm data in English: 200 sows, 450 litters/year, 5,400 pigs weaned, 10% PWM, 5% stillbirth rate. Calculate: PSY, litters/sow/year, born alive/litter. Write a 150-word management commentary on what the data reveals and what actions you recommend."}},{"day":21,"title":"Ôn Tập Tuần 3 — Sinh Sản","tag":"Reproduction Review","reading":"Systematic reproductive problem investigation: increased return-to-estrus rate suggests estrus detection errors, AI technique failures, semen quality problems, or infectious disease (PRRS, parvovirus, leptospirosis). Abortion storms (>5% of pregnant sows aborting in one month) with concurrent respiratory disease and increased stillbirths strongly suggests acute PRRS introduction. Heat stress (ambient >27°C) causes embryonic death, reduced ovulation rate, and severely impaired boar semen quality — a major driver of seasonal infertility in tropical countries. Gilt development program: mate at third estrus or later, minimum 135 kg, backfat 18–20 mm at P2 — gilts mated too young or too light have lower first-parity litter size, longer NPSD, and increased early culling risk.","exercise":{"type":"speaking","prompt":"A 300-sow farm reports: farrowing rate dropped from 87% to 72% over 3 months, with increased 18–24 day returns and 3 late abortions last month. Present your systematic diagnostic approach in English including: history questions, clinical examination priorities, laboratory tests, and initial management recommendations. Speak for 3 minutes."}}]},{"week":4,"title":"Dịch Bệnh Virus Chính","color":"#8B2E1A","days":[{"day":22,"title":"PRRS Virus & Kiểm Soát","tag":"Viral Diseases","reading":"PRRS virus causes the most economically important swine disease globally. Reproductive form: late-term abortions, mummified fetuses, stillbirths, weak-born piglets. Respiratory form: interstitial pneumonia in nursery pigs, increased secondary infections. PRRS is an Arterivirus with extreme strain diversity — North American and European strains are antigenically distinct. Diagnosis: real-time PCR on serum, oral fluid, lung tissue. Management: modified live vaccination, PRRS elimination programs (herd closure, test-and-removal), gilt acclimatization.","exercise":{"type":"writing","prompt":"Write a 200-word PRRS outbreak investigation report in English for a 500-sow farm with: 40% abortion rate, increased stillbirths, and nursery mortality of 25%. Include epidemiology, diagnosis, immediate actions, and long-term control."}},{"day":23,"title":"PCV2 & PCVAD","tag":"Viral Diseases","reading":"PCV2 (Porcine Circovirus type 2) causes PCVAD — an umbrella term for multiple clinical syndromes. PMWS (Postweaning Multisystemic Wasting Syndrome): progressive wasting, generalized lymphadenopathy, interstitial pneumonia in 6–16 week pigs. Diagnosis: PCR combined with histopathology showing lymphocyte depletion and intranuclear inclusion bodies. Key co-factors: PRRS co-infection, immunostimulation around weaning. PCV2 vaccination: virus-like particle vaccines are highly efficacious (>95% reduction in mortality) and cost-effective — the most successful vaccine introduction in swine history.","exercise":{"type":"writing","prompt":"Explain in English why PCV2 vaccination was a breakthrough in swine medicine. Include: what the disease was before vaccines, how the vaccine works, and why PCV2 is still relevant today. Write 150 words."}},{"day":24,"title":"Dịch Tả Heo Châu Phi (ASF)","tag":"Viral Diseases","reading":"African Swine Fever is caused by an Asfivirus — the only DNA arbovirus affecting vertebrates. No vaccine or treatment is available. Mortality approaches 100% in naive populations. Transmission: direct pig-to-pig contact, contaminated feed (especially swill/kitchen waste), fomites, soft ticks (Ornithodoros). Clinical signs: high fever (>40.5°C), hemorrhage throughout organs, sudden death. Key post-mortem findings: enlarged hemorrhagic spleen, hemorrhagic lymph nodes, petechiae in kidneys and bladder. Emergency response: immediate reporting (notifiable disease), movement restrictions, stamping out, decontamination.","exercise":{"type":"speaking","prompt":"Write an emergency ASF response protocol in English for a farm manager who suspects ASF. Include: clinical signs to watch for, who to call, immediate biosecurity actions, what NOT to do, and how to collect samples safely."}},{"day":25,"title":"Dịch Tả Heo Cổ Điển (CSF)","tag":"Viral Diseases","reading":"Classical Swine Fever (CSF), also called hog cholera, is caused by a Pestivirus closely related to bovine viral diarrhea virus. Clinical signs range from peracute death to chronic wasting. Pathognomonic lesions: button ulcers in the cecum and spiral colon, turkey-egg hemorrhagic kidneys. Transplacental infection causes congenital tremors (myoclonia congenita). Control: stamping-out in disease-free countries; emergency vaccination with attenuated C-strain in endemic regions. DIVA (Differentiating Infected from Vaccinated Animals) marker vaccines enable serological surveillance in vaccinated populations.","exercise":{"type":"writing","prompt":"Compare CSF and ASF in a table format in English. Include: causative agent, transmission, mortality rate, key clinical signs, pathognomonic lesions, available vaccine, and control strategy."}},{"day":26,"title":"PED — Tiêu Chảy Cấp Heo","tag":"Viral Diseases","reading":"Porcine Epidemic Diarrhea (PED) is caused by PEDV — an alphacoronavirus. In naive neonatal litters, mortality approaches 100% within 3–5 days. The virus causes severe villous atrophy throughout the small intestine, causing malabsorption and profuse watery diarrhea. In growing-finishing pigs: transient diarrhea with low mortality. Feedback feeding (exposing sows to gut material from infected piglets) stimulates lactogenic immunity, providing IgA-rich colostrum to protect neonates. Transmission: fecal-oral, heavily contaminated transport vehicles (major epidemiological vector). Diagnosis: RT-PCR of feces or small intestine content.","exercise":{"type":"writing","prompt":"Write a farm response plan in English for a PED outbreak in a 300-sow farrow-to-wean unit. Include: immediate actions to reduce neonatal mortality, feedback protocol, biosecurity measures, and monitoring plan."}},{"day":27,"title":"APP & Glässer — Bệnh Hô Hấp + Đa Cơ Quan","tag":"Viral Diseases","reading":"Actinobacillus pleuropneumonia (APP) causes severe fibrinous hemorrhagic pleuropneumonia in grow-finish pigs. Peracute form: sudden death with bloody froth. Post-mortem: bilateral lung infarcts, fibrinous pleuritis, pleural adhesions. APP produces Apx toxins that destroy macrophages and lung parenchyma. There are 19 serotypes; serotypes 1, 5, and 9 are most virulent globally. Glässer's disease (Haemophilus parasuis/Glaesserella parasuis) causes polyserositis in post-weaning pigs — inflammation of pericardium, pleura, and peritoneum. Treatment: ceftiofur, penicillin. Prevention: vaccination, biosecurity, AIAO management.","exercise":{"type":"speaking","prompt":"Describe the post-mortem findings you would expect in a confirmed APP case in English. Include the sequence of examination, specific lesions in each organ system, samples to collect for laboratory confirmation, and what you would submit."}},{"day":28,"title":"Ôn Tập Tuần 4 — Dịch Bệnh Virus","tag":"Viral Diseases Review","reading":"Viral diseases in swine span an enormous range in severity, economic impact, and control options. ASF and CSF are notifiable diseases requiring mandatory government reporting and have devastating herd-level impact. PRRS is the most economically important endemic disease globally. PCV2 was transformed from a catastrophic emerging disease to a manageable condition through vaccination. Disease investigation follows a systematic epidemiological approach: index case identification, contact tracing, diagnostic sample collection, and implementation of control measures. Field veterinarians must balance rapid empirical response with systematic investigation.","exercise":{"type":"writing","prompt":"Compare the investigation approach for two scenarios in English: (A) A single farm with increased nursery mortality — suspected PRRS flare. (B) A sudden cluster of hemorrhagic deaths across multiple farms in a region — suspected ASF. Write the key differences in urgency, reporting requirements, diagnostic approach, and control measures."}}]},{"week":5,"title":"Bệnh Hô Hấp","color":"#5C4A2A","days":[{"day":29,"title":"Mycoplasma & Viêm Phổi Địa Phương","tag":"Respiratory Diseases","reading":"Mycoplasma hyopneumoniae (M. hyo) is the etiological agent of enzootic pneumonia (EP) — the most prevalent swine respiratory disease worldwide, present in >80% of commercial herds. Clinical signs: chronic, dry, non-productive cough beginning at 6–10 weeks. Post-mortem: cranioventral lung consolidation (grape-purple, firm) affecting apical and cardiac lobes — lung lesion score (0–55) is used for herd monitoring at slaughter. Economic impact: reduced daily gain and feed efficiency. Control: vaccination (bacterins) timed to precede infection; in-feed tiamulin or chlortetracycline for metaphylaxis. Detection: ante-mortem PCR of nasal swabs or oral fluids; lung lesion scoring.","exercise":{"type":"writing","prompt":"A 2,000-pig nursery-to-finisher unit has 35% of pigs with a persistent dry cough beginning at week 8 post-weaning, with average daily gain 15% below target. Write a diagnostic and control plan in English including: presumptive diagnosis, laboratory confirmation, treatment protocol, vaccination strategy, and KPIs to monitor."}},{"day":30,"title":"Swine Influenza (SIV)","tag":"Respiratory Diseases","reading":"Swine influenza viruses (SIV) are type A influenza viruses, classified by hemagglutinin (H) and neuraminidase (N) subtypes. Common subtypes: H1N1, H1N2, H3N2. Epidemiology: explosive morbidity (>25% of herd affected within 24 hours), high fever (>41°C), anorexia, labored breathing, then rapid recovery (3–5 days) unless secondary bacterial complications occur. Mortality is usually low (<1%) except in neonates. Reassortment between human and swine influenza strains can create novel pandemic strains — zoonotic risk. Diagnosis: lateral flow antigen assay on nasal swabs (rapid, pen-side), RT-PCR for subtype identification. Treatment: supportive care, NSAIDs for fever. Prevention: multivalent inactivated vaccines.","exercise":{"type":"speaking","prompt":"Write a report in English for a farm owner explaining a swine influenza outbreak that affected 40% of the finishing unit within 48 hours. Include: what SIV is, why it spread so fast, what treatment was given, and how to prevent recurrence."}},{"day":31,"title":"Bordetella & Viêm Mũi Teo (AR)","tag":"Respiratory Diseases","reading":"Atrophic rhinitis (AR) is caused by the combined action of Bordetella bronchiseptica (colonization and early damage) and toxigenic strains of Pasteurella multocida (producing dermonecrotic toxin causing turbinate destruction). Progressive AR causes irreversible turbinate atrophy and lateral snout deviation — quantified at slaughter by turbinate score (0–4). Non-progressive AR (Bordetella alone): reversible with treatment. Clinical signs: sneezing, epistaxis, tear staining, snout deviation. Diagnosis: snout cross-section scoring post-mortem; nasal swab culture for toxigenic P. multocida. Control: vaccination of sows (passive immunity via colostrum), piglet vaccination, and strategic antimicrobials.","exercise":{"type":"writing","prompt":"Explain progressive atrophic rhinitis to a group of farm workers in simple but technically accurate English. Include: causes, how to recognize it in the field, why it matters economically, and what prevention measures to implement on farm."}},{"day":32,"title":"Streptococcus suis — Viêm Màng Não","tag":"Respiratory Diseases","reading":"Streptococcus suis (S. suis) is the most important bacterial pathogen of post-weaning pigs globally and a significant zoonosis. Clinical presentations: meningitis (most common — ataxia, paddling, opisthotonus, nystagmus, death within hours), arthritis, septicemia (peracute death), pneumonia. Carrier pigs harbor S. suis asymptomatically in the tonsils — stress triggers systemic spread. Risk factors: weaning, mixing, overcrowding, concurrent PRRS. Treatment: high-dose penicillin G (most strains remain susceptible); prompt treatment is critical. Prevention: strategic penicillin, S. suis vaccine (limited efficacy due to serotype diversity), excellent stockmanship at weaning.","exercise":{"type":"writing","prompt":"Write a case report in English for a veterinary colleague describing a S. suis meningitis outbreak in a nursery unit: signalment, clinical signs, post-mortem findings, diagnosis, treatment protocol, and prevention strategy implemented."}},{"day":33,"title":"Actinobacillus pleuropneumonia (APP)","tag":"Respiratory Diseases","reading":"APP clinical forms: peracute (sudden death, bloody nasal/oral discharge, cyanosis — mortality within 24 hours), acute (high fever 40.5–41.5°C, dyspnea, reluctance to move), chronic (reduced growth, intermittent cough, pleural adhesions reducing carcass value at slaughter). Pathogenesis: Apx toxins I, II, IV cause macrophage and erythrocyte lysis → hemorrhagic lung necrosis. Treatment: ceftiofur (3–5 mg/kg IM) or penicillin + metaphylaxis of pen-mates. Key post-mortem differential from PRRS: APP causes segmental (not diffuse) necrotic lung infarcts with sharp borders; PRRS causes diffuse bilateral interstitial pneumonia. Prevention: vaccination (bacterin or subunit Apx toxoid), AIAO, biosecurity.","exercise":{"type":"speaking","prompt":"Write a differential diagnosis in English distinguishing APP from PRRS in a grow-finish unit with acute respiratory disease and sudden deaths. Include: clinical signs, post-mortem findings, laboratory tests, and initial treatment while waiting for results."}},{"day":34,"title":"PRDC — Phức Hợp Bệnh Hô Hấp","tag":"Respiratory Diseases","reading":"Porcine Respiratory Disease Complex (PRDC) is the most economically important respiratory disease syndrome in grow-finish pigs — estimated annual cost >$2/pig marketed in intensive systems. PRDC involves concurrent infection with multiple primary (PRRS, SIV, PCV2, M. hyo) and secondary (APP, Pasteurella multocida, Bordetella, Streptococcus suis) pathogens. Synergism between pathogens produces disease severity far exceeding what any single pathogen causes alone. Clinical scoring systems (0–3) standardize disease assessment and treatment decisions. Antimicrobial stewardship principles guide treatment: use pen-side tests to confirm bacterial etiology before prescribing, choose based on susceptibility data, treat early.","exercise":{"type":"writing","prompt":"Design a PRDC monitoring and control program in English for a 5,000-pig finishing unit. Include: disease scoring protocol, decision criteria for metaphylaxis, antibiotic selection rationale, lung lesion monitoring at slaughter, and vaccination program."}},{"day":35,"title":"Ôn Tập Tuần 5 — Bệnh Hô Hấp","tag":"Respiratory Diseases Review","reading":"Respiratory disease surveillance combines active monitoring (clinical scoring, growth data) with passive surveillance (lung lesion scoring at slaughter, mortality records). Oral fluid sampling using cotton ropes — collected in the morning when pigs are active — provides a pooled herd sample for PCR testing with minimal labor and animal stress. HEPA air filtration systems can exclude airborne PRRS virus from susceptible herds in high-density production areas. Effective respiratory disease control integrates five elements: population medicine approach, vaccination, antimicrobial stewardship, AIAO management, and biosecurity. Understanding the relative epidemiological role of each pathogen in a herd drives prioritization.","exercise":{"type":"writing","prompt":"Write a 6-month respiratory health improvement plan in English for a 2,000-sow farrow-to-finish operation with chronic PRDC problems. Include baseline assessment, specific interventions, implementation timeline, and measurable targets."}}]},{"week":6,"title":"Bệnh Đường Tiêu Hóa","color":"#2A5C4A","days":[{"day":36,"title":"ETEC & Tiêu Chảy Sơ Sinh","tag":"Enteric Diseases","reading":"Enterotoxigenic E. coli (ETEC) causes the majority of neonatal (0–7 days) and post-weaning diarrhea in swine worldwide. ETEC produces fimbriae (F4/K88, F5/K99, F18, F41) that attach to intestinal epithelium and enterotoxins (heat-labile LT, heat-stable STa and STb) that activate secretory pathways causing profuse watery diarrhea. Neonatal disease: death from dehydration within 12–24 hours. Prevention in neonates: sow vaccination (E. coli bacterin containing homologous fimbriae antigens) 5–6 weeks pre-farrowing provides IgA-rich colostrum protection. Post-weaning ETEC: zinc oxide, organic acids, probiotics, vaccination. Treatment: oral electrolytes + targeted antibiotics based on sensitivity.","exercise":{"type":"speaking","prompt":"Write a sow vaccination program recommendation in English for a farm with a persistent ETEC neonatal diarrhea problem (40% of litters affected in first week). Include: vaccine selection rationale, administration schedule, expected outcomes, and adjunct management."}},{"day":37,"title":"Clostridium perfringens","tag":"Enteric Diseases","reading":"Clostridium perfringens type C causes acute hemorrhagic necrotic enteritis in piglets under 7 days. Bloody, reddish-brown diarrhea, rapid death (often within 12–24 hours of onset), high mortality. Key post-mortem: necrotic small intestine with gas bubbles in the intestinal wall. Beta toxin (destroyed by trypsin — piglets have low trypsin activity) causes the necrotic lesions. Type A causes milder, less hemorrhagic enteritis in piglets 1–4 weeks. Diagnosis: PCR/anaerobic culture from fresh intestinal content; ELISA for toxin detection. Treatment: antitoxin + penicillin (often too late in type C). Prevention: sow vaccination (Cl. perfringens type C and D toxoid) and optional colostral antitoxin to piglets.","exercise":{"type":"writing","prompt":"Write a diagnostic approach in English for a farm where multiple piglets per litter are dying within the first 3 days with bloody diarrhea. Compare Cl. perfringens type C versus type A in terms of age affected, clinical signs, gross pathology, and control strategy."}},{"day":38,"title":"Salmonella ở Heo","tag":"Enteric Diseases","reading":"Salmonella Typhimurium and S. Choleraesuis are the most important serovars in pigs. S. Typhimurium causes enterocolitis (bloody diarrhea, fever) and is a major food safety concern — asymptomatic carrier pigs contaminate the abattoir environment. Multidrug-resistant strains (DT104 phage type) carry resistance genes on chromosomal pathogenicity islands. S. Choleraesuis causes septicemica with >50% mortality in untreated pigs. Pre-harvest interventions: feed acidification, competitive exclusion, reduced stocking density pre-slaughter. Diagnosis: fecal or mesenteric lymph node culture; serotyping; antibiogram. Control: HACCPbased approach from farm to fork — on-farm Salmonella status affects market access in some countries.","exercise":{"type":"writing","prompt":"Explain the One Health significance of Salmonella in swine production in English. Include: how pigs serve as a reservoir, mechanisms of spread to humans, why multidrug resistance is particularly concerning, and what interventions at the farm level reduce public health risk."}},{"day":39,"title":"Lawsonia — Viêm Hồi Tràng","tag":"Enteric Diseases","reading":"Lawsonia intracellularis causes Porcine Proliferative Enteropathy (PPE). Two forms: chronic (most common) — profuse watery diarrhea in 6–20 week pigs, poor growth, pasty feces; acute hemorrhagic form (PHE, bloody gut) — sudden death in pigs 4–12 months, blood-filled intestine at necropsy. Lawsonia is an obligate intracellular pathogen — lives only inside enterocytes, making culture impossible. Diagnosis: fecal PCR (most sensitive and practical); immunohistochemistry on intestinal tissue. Treatment: tylosin, tiamulin, or lincomycin in feed or water. Prevention: live oral vaccine (available in some markets); strategic antimicrobials at high-risk periods.","exercise":{"type":"speaking","prompt":"Compare the chronic (PPE) and acute (PHE) forms of Lawsonia infection in English using a comparison table. Include: age affected, clinical signs, post-mortem findings, diagnosis, treatment, and economic impact."}},{"day":40,"title":"Kiết Lỵ Heo — Swine Dysentery","tag":"Enteric Diseases","reading":"Swine dysentery, caused by Brachyspira hyodysenteriae, affects growing-finishing pigs. Mucohemorrhagic bloody colitis with fibrin casts — typically intermittent, exacerbated by stress. Diagnosis: anaerobic culture on selective media (BHIA + antibiotics) + darkfield microscopy showing large spiral bacteria with strong beta-hemolysis; PCR for species confirmation. Treatment: valnemulin (most effective), tiamulin, lincomycin. Eradication is possible: depopulation, thorough cleaning and disinfection, rodent control (mice are asymptomatic carriers), restock with Brachyspira-negative pigs. Avoid antimicrobials that select for resistance before eradication. Economic impact: chronic colitis reduces FCR by 15–25%.","exercise":{"type":"writing","prompt":"Write an eradication protocol for swine dysentery in English for a 1,000-pig finishing unit. Include: decision criteria for eradication versus control, step-by-step eradication procedure, rodent control rationale, restocking requirements, and monitoring to confirm success."}},{"day":41,"title":"Chẩn Đoán Bệnh Tiêu Hóa","tag":"Enteric Diseases","reading":"Enteric disease diagnosis requires systematic assessment: age at onset (neonatal vs. post-weaning vs. growing-finishing), fecal consistency score (1=normal to 4=projectile watery), dehydration assessment (skin tent test — skin returns to normal in <2 seconds = <6% dehydration; 2–5 seconds = 6–8%; >5 seconds = >8%), and sample collection (fresh feces/intestinal loops from acutely affected, untreated animals). Diagnosis depends on fresh samples — autolysis destroys pathogens rapidly. Fluid therapy routes: oral (mild), intraperitoneal (moderate-severe in piglets), intravenous (severe). Histopathology: villous-crypt ratio is the key metric — atrophic villi indicate viral or nutritional etiology; normal villi with mucosal inflammation indicate bacterial toxin effects.","exercise":{"type":"writing","prompt":"Write a diagnostic workup in English for a 3-week-old piglet with: 3-day history of pasty-to-watery yellow diarrhea, 10% dehydration, and no response to amoxicillin treatment. Include: differential diagnosis, sample collection protocol, laboratory tests to request, and treatment adjustment."}},{"day":42,"title":"Ôn Tập Tuần 6 — Bệnh Tiêu Hóa","tag":"Enteric Diseases Review","reading":"The post-weaning period represents the highest enteric disease risk in the production cycle. Weaning simultaneously imposes: dietary change (sow's milk to dry diet), social stress (regrouping), environmental change (farrowing room to nursery), and withdrawal of maternal antibody protection. This convergence of stressors causes intestinal dysbiosis — disruption of the normal microbiome — creating a window of vulnerability to ETEC, Lawsonia, Clostridium, and rotavirus. Maintaining intestinal barrier function through nutrition (zinc oxide, organic acids, probiotics), management (AIAO, reduced stocking density), and targeted metaphylaxis reduces post-weaning disease burden without excessive antibiotic use.","exercise":{"type":"speaking","prompt":"Design a comprehensive post-weaning disease prevention program in English for an 800-sow farrow-to-finish farm aiming to reduce PWD mortality from 3% to <1% without routine antibiotic prophylaxis. Include specific interventions, their mode of action, dosing, and how you will measure success."}}]},{"week":7,"title":"Vaccine & An Toàn Sinh Học","color":"#4A2A5C","days":[{"day":43,"title":"Erysipelas — Bệnh Đóng Dấu","tag":"Vaccines & Biosecurity","reading":"Study the vocabulary above thoroughly. Then consult: The Pig Site (thepigsite.com), Pig Progress (pigprogress.net), or Merck Veterinary Manual for in-depth coverage of Erysipelas — Bệnh Đóng Dấu. Apply the terms in your daily farm and clinical practice.","exercise":{"type":"writing","prompt":"Write 200 words or speak for 2 minutes in English about Erysipelas — Bệnh Đóng Dấu. Use at least 6 vocabulary words from today. Connect the topic to your own farm or clinical experience."}},{"day":44,"title":"Leptospirosis","tag":"Vaccines & Biosecurity","reading":"Study the vocabulary above thoroughly. Then consult: The Pig Site (thepigsite.com), Pig Progress (pigprogress.net), or Merck Veterinary Manual for in-depth coverage of Leptospirosis. Apply the terms in your daily farm and clinical practice.","exercise":{"type":"writing","prompt":"Write 200 words or speak for 2 minutes in English about Leptospirosis. Use at least 6 vocabulary words from today. Connect the topic to your own farm or clinical experience."}},{"day":45,"title":"Parvovirus PPV & SMEDI","tag":"Vaccines & Biosecurity","reading":"Study the vocabulary above thoroughly <script>

// ════════════════════════════════════════════════════════════
// BUILD DATA
// ════════════════════════════════════════════════════════════
const DAY_MAP = {};
const ALL_VOCAB = [];
WEEKS.forEach(w => {
  w.days.forEach(d => {
    const vocab = VOCAB_90[d.day] || [];
    DAY_MAP[d.day] = { ...d, vocab, weekColor: w.color, weekTitle: w.title, weekNum: w.week };
    vocab.forEach(v => ALL_VOCAB.push({ ...v, topic: d.tag, day: d.day }));
  });
});

// ════════════════════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════════════════════
const S = {
  get: (k, d = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let CUR_DAY = S.get('cd', 1);
let USER_NAME = S.get('name', '');
let PROGRESS = S.get('pg', {});
let STREAK = S.get('sk', { cur: 0, lng: 0, last: null });
let PRON_HIST = S.get('ph', []);
let SETTINGS = S.get('st', { ttsRate: 0.82, remOn: false, remTime: '07:00', theme: 'dark' });
let OPEN_BLOCK = 'vocab';
let OPEN_VOCAB = null;
let OPEN_WEEK = null;
let FC_IDX = 0; let FC_FLIP = false; let FC_VOCAB = [];
let QQ = []; let QI = 0; let QS = 0; let QA = null; let Q_DONE = false;
let V_SEARCH = ''; let V_TOPIC = '';
let PRON_IDX = 0; let PRON_SRC = []; let IS_REC = false; let RECOGNITION = null;
let CUR_PAGE = 'today';

// ════════════════════════════════════════════════════════════
// TTS
// ════════════════════════════════════════════════════════════
let SELECTED_VOICE = S.get('sv', null); // store voice name

function tts(text, cb) {
  if (!window.speechSynthesis || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = SETTINGS.ttsRate || 0.82; u.pitch = 1;
  const vv = speechSynthesis.getVoices();
  let v = null;
  if (SELECTED_VOICE) v = vv.find(x => x.name === SELECTED_VOICE);
  if (!v) v = vv.find(x => x.lang.startsWith('en-') && x.name.includes('Google'))
             || vv.find(x => x.lang.startsWith('en-US'))
             || vv.find(x => x.lang.startsWith('en-'));
  if (v) u.voice = v;
  if (cb) u.onend = cb;
  speechSynthesis.speak(u);
}

function getEnVoices() {
  const vv = speechSynthesis.getVoices();
  // Prioritize: en-US, en-GB, en-AU, en-IN, then any en-
  const preferred = ['en-US','en-GB','en-AU','en-IN','en-CA','en-NZ'];
  const sorted = [];
  preferred.forEach(loc => vv.filter(v => v.lang === loc).forEach(v => sorted.push(v)));
  vv.filter(v => v.lang.startsWith('en-') && !sorted.includes(v)).forEach(v => sorted.push(v));
  return sorted.slice(0, 8); // max 8 voices
}

function loadVoiceGrid() {
  const grid = document.getElementById('voice-grid');
  if (!grid) return;
  const voices = getEnVoices();
  if (!voices.length) {
    grid.innerHTML = '<div style="font-size:.75rem;color:var(--t3);grid-column:1/-1">Chưa tải được giọng. Thử lại sau 1 giây.</div>';
    setTimeout(loadVoiceGrid, 1000);
    return;
  }
  const accents = {'en-US':'🇺🇸 Mỹ','en-GB':'🇬🇧 Anh','en-AU':'🇦🇺 Úc','en-IN':'🇮🇳 Ấn','en-CA':'🇨🇦 Canada','en-NZ':'🇳🇿 NZ'};
  grid.innerHTML = voices.map(v => {
    const isSel = SELECTED_VOICE === v.name || (!SELECTED_VOICE && voices[0]?.name === v.name);
    const accent = accents[v.lang] || v.lang;
    const shortName = v.name.replace(/Google\s*/i,'').replace(/Microsoft\s*/i,'').replace(/Apple\s*/i,'').trim().substring(0,14);
    return `<button class="voice-btn${isSel?' sel':''}" onclick="selectVoice('${v.name.replace(/'/g,"\'")}')" title="${v.name}">
      <span class="voice-name">${shortName}</span><span class="voice-lang">${accent}</span>
    </button>`;
  }).join('');
}

function selectVoice(name) {
  SELECTED_VOICE = name; S.set('sv', name);
  loadVoiceGrid();
  setTimeout(() => tts('Hello! This is my pronunciation. Feed conversion ratio. Artificial insemination.'), 100);
  showToast('🔊 Đã chọn giọng: ' + name.substring(0,25));
}

window.addEventListener('load', () => {
  setTimeout(() => { speechSynthesis.getVoices(); loadVoiceGrid(); }, 400);
});
speechSynthesis.onvoiceschanged = loadVoiceGrid;

// ════════════════════════════════════════════════════════════
// PRONUNCIATION ENGINE
// ════════════════════════════════════════════════════════════
function lev(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}
function pronScore(heard, target) {
  const h = heard.toLowerCase().replace(/[^a-z\s]/g, '').trim();
  const t = target.toLowerCase().replace(/[^a-z\s]/g, '').trim();
  if (h === t) return 100;
  // Also check partial match (first word)
  const hWords = h.split(' '); const tWords = t.split(' ');
  const wordMatch = tWords.filter(tw => hWords.some(hw => lev(hw, tw) <= 1)).length / tWords.length;
  const charScore = Math.max(0, Math.round((1 - lev(h, t) / Math.max(h.length, t.length, 1)) * 100));
  return Math.round(Math.max(charScore, wordMatch * 100));
}
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Trình duyệt không hỗ trợ nhận giọng nói. Trên iPhone: dùng Safari 14.5+', 'err'); return; }
  if (IS_REC) { stopListening(); return; }
  const vocab = PRON_SRC.length ? PRON_SRC : ALL_VOCAB.slice(0, 20);
  const word = vocab[PRON_IDX]?.en || '';
  IS_REC = true; RECOGNITION = new SR();
  RECOGNITION.lang = 'en-US'; RECOGNITION.interimResults = false; RECOGNITION.maxAlternatives = 3;
  setMic(true); setPronStatus('🎤 Đang nghe... Hãy nói: "' + word.split('(')[0].trim() + '"');
  RECOGNITION.onresult = e => {
    const heard = Array.from(e.results[0]).map(r => r.transcript).join(' ');
    IS_REC = false; setMic(false);
    const score = pronScore(heard, word);
    const hist = { word, heard, score, date: Date.now() };
    PRON_HIST.unshift(hist); if (PRON_HIST.length > 100) PRON_HIST.pop();
    S.set('ph', PRON_HIST);
    showPronResult(heard, word, score);
  };
  RECOGNITION.onerror = e => {
    IS_REC = false; setMic(false);
    if (e.error === 'aborted') setPronStatus('⚠️ Bị gián đoạn — nhấn 🎤 thử lại');
    else if (e.error === 'not-allowed') setPronStatus('🔒 Cài đặt → Safari → Microphone → Cho phép');
    else if (e.error === 'no-speech') setPronStatus('🔇 Không nghe — nói to hơn và thử lại');
    else setPronStatus('❌ Lỗi: ' + e.error + ' — thử lại');
  };
  RECOGNITION.onend = () => { if (IS_REC) { IS_REC = false; setMic(false); setPronStatus('Chưa nghe được. Nhấn lại 🎤'); } };
  try { RECOGNITION.start(); } catch (e) { IS_REC = false; setMic(false); setPronStatus('Không mở được microphone.'); }
}
function stopListening() { IS_REC = false; if (RECOGNITION) try { RECOGNITION.stop(); } catch {} setMic(false); }
function setMic(on) { const el = document.getElementById('mic-btn'); if (!el) return; el.className = 'mic-btn' + (on ? ' rec' : ''); el.textContent = on ? '⏹' : '🎤'; }
function setPronStatus(t) { const el = document.getElementById('pron-status'); if (el) el.textContent = t; }
function showPronResult(heard, target, score) {
  const el = document.getElementById('pron-res');
  if (!el) return;
  const cls = score >= 88 ? 'res-perfect' : score >= 62 ? 'res-good' : 'res-try';
  const emoji = score >= 88 ? '🏆' : score >= 62 ? '👍' : '💪';
  const feedback = score >= 88 ? 'Hoàn hảo! Phát âm rất chuẩn!' : score >= 62 ? 'Tốt! Tiếp tục luyện tập.' : 'Cần luyện thêm — nghe lại và thử tiếp.';
  const tWords = target.toLowerCase().split(' ');
  const hWords = heard.toLowerCase().split(' ');
  const cmp = tWords.map((tw, i) => `<span class="cmp-c ${lev(tw, hWords[i] || '') <= 1 ? 'cmp-ok' : 'cmp-bad'}">${tw}</span>`).join(' ');
  el.className = 'pron-res show ' + cls;
  el.innerHTML = `<div class="pron-score">${emoji} ${score}%</div>
    <div style="font-size:.78rem;color:var(--t2);margin-bottom:5px">Bạn nói: "<strong style="color:var(--c)">${heard}</strong>"</div>
    <div class="cmp-row">${cmp}</div>
    <div style="font-size:.85rem;font-weight:700;margin-top:6px;color:${score>=88?'var(--gl)':score>=62?'var(--al)':'#E06040'}">${feedback}</div>`;
  setPronStatus('');
}

// ════════════════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════════════════
function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type === 'err' ? 'err' : type === 'info' ? 'info' : '';
  el.style.display = 'block';
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display = 'none', 3200);
}

// ════════════════════════════════════════════════════════════
// PROGRESS & STREAK
// ════════════════════════════════════════════════════════════
function getProg(day) {
  const p = PROGRESS[day] || {};
  const skills = ['v','ls','sp','r','e'];
  const done = skills.filter(k => p[k]).length;
  return { ...p, done, pct: Math.round(done / skills.length * 100), full: done === skills.length };
}
function saveProg(day, upd) {
  PROGRESS[day] = { ...(PROGRESS[day] || {}), ...upd };
  const dp = PROGRESS[day];
  if (dp.v && dp.ls && dp.sp && dp.r && dp.e && !dp.done) {
    dp.done = Date.now();
    updateStreak();
    showToast('🎉 Hoàn thành tất cả 4 kỹ năng hôm nay! 🎓');
    triggerSuccess('🏆');
  }
  S.set('pg', PROGRESS);
  document.querySelector('#blk-' + (upd.v !== undefined ? 'vocab' : upd.r !== undefined ? 'reading' : 'exercise') + ' .chk')?.classList.toggle('done', !!(upd.v || upd.r || upd.e));
}
function updateStreak() {
  const today = new Date().toDateString();
  if (STREAK.last === today) return;
  const yest = new Date(Date.now() - 86400000).toDateString();
  STREAK.cur = STREAK.last === yest ? STREAK.cur + 1 : 1;
  STREAK.lng = Math.max(STREAK.lng, STREAK.cur);
  STREAK.last = today; S.set('sk', STREAK);
  document.getElementById('hdr-streak').textContent = '🔥';
}
function getOverall() {
  const done = Object.values(PROGRESS).filter(p => p.v && p.r && p.e).length;
  return { done, pct: Math.round(done / 90 * 100) };
}

// ════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════
function goPage(pg) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('on'));
  document.getElementById('pg-' + pg).classList.add('on');
  document.querySelector('[data-p="' + pg + '"]').classList.add('on');
  CUR_PAGE = pg;
  const subs = { today: 'Ngày ' + CUR_DAY + ' — ' + (DAY_MAP[CUR_DAY]?.tag || ''), pron: 'Luyện Phát Âm 🎤', cur: 'Lộ Trình 90 Ngày', vocab: 'Kho Từ Vựng (' + ALL_VOCAB.length + ' từ)', stats: 'Thống Kê Học Tập', settings: 'Cài Đặt' };
  document.getElementById('hdr-sub').textContent = subs[pg] || '';
  renderPage(pg);
}
function renderPage(pg) {
  if (pg === 'today') renderToday();
  else if (pg === 'pron') renderPron();
  else if (pg === 'cur') renderCurriculum();
  else if (pg === 'vocab') renderVocab();
  else if (pg === 'stats') renderStats();
  else if (pg === 'settings') renderSettings();
}

// ════════════════════════════════════════════════════════════
// PAGE: TODAY
// ════════════════════════════════════════════════════════════

function blk(id, ic, ttl, tm, inner, isOpen) {
  return `<div class="blk${isOpen?' open':''}" id="blk-${id}">

      <span class="blk-ic">${ic}</span><span class="blk-ttl">${ttl}</span>
      <span class="blk-tm">${tm}</span><span class="blk-arr">▶</span>
    </div><div class="blk-bd"><div class="blk-in">${inner}</div></div></div>`;
}
function togBlk(id) { OPEN_BLOCK = OPEN_BLOCK === id ? null : id; document.querySelectorAll('.blk').forEach(b => b.classList.remove('open')); if (OPEN_BLOCK) document.getElementById('blk-' + OPEN_BLOCK)?.classList.add('open'); }

function warmupHtml(prev) {
  if (!prev || !prev.length) return '<div style="font-size:.81rem;color:var(--t3);font-style:italic">Ngày đầu tiên — bắt đầu học từ mới! 🐷</div>';
  return prev.map(v => `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b)">
    <button onclick="tts('${v.en.replace(/'/g,"\\'")}')" class="tts-ic">🔊</button>
    <div><div class="vi-en" style="font-size:.85rem">${v.en}</div><div class="vi-vn">${v.vi}</div></div>

}

function vocabHtml(vocab, p) {
  if (FC_VOCAB.length && FC_VOCAB === vocab) return flashHtml();
  return `<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px">

function togVI(key) { OPEN_VOCAB = OPEN_VOCAB === key ? null : key; document.querySelectorAll('.vi').forEach(v => v.classList.remove('open')); if (OPEN_VOCAB) document.getElementById('vi-' + OPEN_VOCAB)?.classList.add('open'); }

function chkHtml(key, label, done) {
  return `<button class="chk${done?' done':''}" onclick="markDone('${key}')">
    <div class="chk-c">${done?'✓':''}</div><span>${done?label:label.replace('✓ ','')}</span></button>`;
}
function markDone(key) {
  saveProg(CUR_DAY, { [key]: true });
  // update this specific chk button
  document.querySelectorAll('#pg-today .chk').forEach(el => {
    const oc = el.getAttribute('onclick') || '';
    if (oc.includes("'"+key+"'")) {
      el.classList.add('done');
      const cc = el.querySelector('.chk-c'); if (cc) cc.textContent = '✓';
    }
  });
  // Check full completion: vocab + all 4 skills
  const p = PROGRESS[CUR_DAY] || {};
  if (p.v && p.ls && p.sp && p.r && p.e) {
    if (!p.done) { p.done = Date.now(); PROGRESS[CUR_DAY] = p; updateStreak(); showToast('🎉 Hoàn thành bài học hôm nay! 🎓'); triggerSuccess('🏆'); S.set('pg', PROGRESS); }
  }
}
function saveEx() { const v = document.getElementById('ex-ta')?.value; if (v !== undefined) { saveProg(CUR_DAY, { txt: v }); showToast('💾 Đã lưu bài viết!'); } }
function chDay(d) { const nd = CUR_DAY + d; if (nd < 1 || nd > 90) return; CUR_DAY = nd; S.set('cd', nd); OPEN_BLOCK = 'vocab'; OPEN_VOCAB = null; QQ = []; QI = 0; QS = 0; QA = null; Q_DONE = false; FC_VOCAB = []; renderToday(); }

// QUIZ
function buildQQ(vocab) {
  if (QQ.length) return;
  QQ = vocab.slice(0, 4).map(v => {
    const wrong = vocab.filter(w => w.vi !== v.vi).sort(() => Math.random() - .5).slice(0, 3);
    return { q: v.en, pron: v.pron, ans: v.vi, opts: [...wrong.map(w => w.vi), v.vi].sort(() => Math.random() - .5) };
  });
}
function quizHtml(d) {
  if (Q_DONE) {
    const em = QS === 4 ? '🏆' : QS >= 3 ? '⭐' : '💪';
    return `<div style="text-align:center;padding:14px"><div style="font-size:2.2rem">${em}</div>
      <div style="font-size:1.2rem;font-weight:900;color:var(--a);margin:8px 0">${QS}/4 câu đúng</div>
      <div style="font-size:.82rem;color:var(--t2)">${QS===4?'Xuất sắc! Từ vựng hôm nay đã nắm vững.':QS>=2?'Tốt! Ôn lại từ còn yếu nhé.':'Xem lại phần từ vựng rồi thử lại.'}</div>
      <button class="btn btn-o btn-sm" style="margin-top:12px" onclick="QQ=[];QI=0;QS=0;QA=null;Q_DONE=false;const el=document.querySelector('#blk-quiz .blk-in');if(el)el.innerHTML=quizHtml(DAY_MAP[CUR_DAY])">🔄 Làm lại</button></div>`;
  }
  buildQQ(d.vocab);
  if (!QQ.length) return '<div style="color:var(--t3)">Không có câu hỏi</div>';
  const q = QQ[QI] || QQ[0];
  return `<div>
    <div style="font-size:.68rem;color:var(--t2);margin-bottom:7px">Câu ${QI+1}/4</div>
    <div style="font-size:.93rem;font-weight:700;color:var(--c);margin-bottom:4px">${q.q}</div>
    <div style="font-size:.72rem;color:var(--a);margin-bottom:12px">${q.pron}</div>
    ${q.opts.map(o => `<button class="qo${QA?o===q.ans?' correct':o===QA?' wrong':'':''}" onclick="ansQ('${o.replace(/'/g,"\\'")}')" ${QA?'disabled':''}>${o}</button>`).join('')}
  </div>`;
}
function ansQ(chosen) {
  if (QA) return; QA = chosen;
  const q = QQ[QI]; const ok = chosen === q.ans; if (ok) QS++;
  document.querySelectorAll('.qo').forEach(b => { b.disabled = true; if (b.textContent === q.ans) b.classList.add('correct'); else if (b.textContent === chosen && !ok) b.classList.add('wrong'); });
  setTimeout(() => { QI++; QA = null; if (QI >= 4) { Q_DONE = true; saveProg(CUR_DAY, { qs: QS }); } const el = document.querySelector('#blk-quiz .blk-in'); if (el) el.innerHTML = quizHtml(DAY_MAP[CUR_DAY]); }, 850);
}

  </div>`;
}
function speakAll() { const v = DAY_MAP[CUR_DAY]?.vocab || []; let i = 0; const next = () => { if (i >= v.length) return; tts(v[i].en + '. ' + v[i].vi, () => { i++; setTimeout(next, 500); }); }; next(); }

function renderPron() {
  const vocab = PRON_SRC.length ? PRON_SRC : ALL_VOCAB.slice(0, 20);
  const v = vocab[PRON_IDX] || vocab[0];
  if (!v) return;
  const el = document.getElementById('pg-pron');
  const avgS = PRON_HIST.length ? Math.round(PRON_HIST.slice(0,10).reduce((s,h)=>s+h.score,0)/Math.min(10,PRON_HIST.length)) : null;
  el.innerHTML = `
  <div class="sec" style="margin-bottom:12px">🎤 Luyện Phát Âm AI</div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px">
    <button class="btn btn-sm${!PRON_SRC.length?' btn-p':' btn-s'}" onclick="PRON_SRC=[];PRON_IDX=0;renderPron()">📝 Tất cả từ vựng</button>

function renderCurriculum() {
  const el = document.getElementById('pg-cur');
  let h = '<div class="sec" style="margin-bottom:12px">🗓 Lộ Trình 90 Ngày</div>';
  WEEKS.forEach(w => {
    const done = w.days.filter(d => { const p = PROGRESS[d.day] || {}; return p.v && p.r && p.e; }).length;
    const pct = Math.round(done / w.days.length * 100);
    const isCur = w.days.some(d => d.day === CUR_DAY);
    const isOpen = OPEN_WEEK === w.week;
    h += `<div class="wk-row${isCur?' cur':''}" onclick="OPEN_WEEK=OPEN_WEEK===w?null:${w.week};renderCurriculum()">
      <div class="wk-num" style="background:${w.color}20;border:2px solid ${w.color};color:${w.color}">W${w.week}</div>
      <div class="wk-info"><div class="wk-ttl">Tuần ${w.week}: ${w.title}</div>
        <div class="wk-sub">Ngày ${w.days[0].day}–${w.days[w.days.length-1].day} · ${done}/${w.days.length} hoàn thành</div></div>
      <div style="font-weight:900;color:${w.color};font-size:.92rem">${pct}%</div>
    </div>
    <div class="wk-days-wrap${isOpen?' open':''}" id="wd-${w.week}">
    ${w.days.map((d,i)=>{ const p=PROGRESS[d.day]||{}; const done=p.v&&p.r&&p.e; const isT=d.day===CUR_DAY;
      return `<div class="tl-item" onclick="CUR_DAY=${d.day};S.set('cd',${d.day});OPEN_BLOCK='vocab';QQ=[];goPage('today')" style="${isT?'background:var(--ap)':''}">
        <div class="tl-dot ${done?'done':isT?'today':'lock'}">${done?'✓':d.day}</div>
        <div style="flex:1"><div style="font-size:.83rem;color:${isT?'var(--al)':'var(--t)'};font-weight:${isT?700:500}">${d.title}${isT?' ← Hôm nay':''}</div>

  });

}

function toggleRem() {
  const tog = document.getElementById('rem-tog'); if (!tog) return;
  const on = !SETTINGS.remOn; SETTINGS.remOn = on; S.set('st', SETTINGS); tog.classList.toggle('on', on);
  if (on) {
    if (!('Notification' in window)) { showToast('Trình duyệt không hỗ trợ thông báo', 'err'); return; }
    Notification.requestPermission().then(p => {
      if (p === 'granted') { scheduleReminder(); showToast('🔔 Đã bật nhắc học!'); }
      else { SETTINGS.remOn = false; S.set('st', SETTINGS); tog.classList.remove('on'); showToast('Cần cho phép thông báo trong Cài đặt', 'err'); }
    });
  } else { clearTimeout(window._remTimer); showToast('Đã tắt nhắc học'); }
}
function scheduleReminder() {
  const [h, m] = (SETTINGS.remTime || '07:00').split(':').map(Number);
  const now = new Date(); const next = new Date(now); next.setHours(h, m, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  clearTimeout(window._remTimer);
  window._remTimer = setTimeout(() => {
    if (SETTINGS.remOn) { new Notification('🐷 Swine English', { body: 'Đến giờ học! Ngày ' + CUR_DAY + ': ' + (DAY_MAP[CUR_DAY]?.title || ''), tag: 'study' }); scheduleReminder(); }
  }, next - now);
}
function testNotif() {
  if (!('Notification' in window)) { showToast('Không hỗ trợ thông báo', 'err'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') { new Notification('🐷 Swine English', { body: 'Đây là thông báo thử! Ngày ' + CUR_DAY + ': ' + (DAY_MAP[CUR_DAY]?.title || ''), tag: 'test' }); showToast('✅ Đã gửi thông báo!'); }
    else showToast('Vào Cài đặt → Safari → Thông báo → Cho phép', 'err');

}

let SP_REC = null; let SP_ACTIVE = false;

function startSpeakPrac() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Safari 14.5+ hỗ trợ nhận giọng nói', 'err'); return; }
  if (SP_ACTIVE) { stopSpeakPrac(); return; }
  const spIdx = PROGRESS[CUR_DAY]?.spIdx || 0;
  const vocab = DAY_MAP[CUR_DAY]?.vocab || [];
  const target = vocab[spIdx];
  if (!target) return;
  SP_ACTIVE = true; SP_REC = new SR();
  SP_REC.lang = 'en-US'; SP_REC.interimResults = false; SP_REC.maxAlternatives = 5;
  const btn = document.getElementById('sp-mic');
  if (btn) { btn.textContent = '⏹ Dừng'; btn.style.background = 'var(--r)'; }
  document.getElementById('sp-status').textContent = '🎤 Đang nghe... Hãy nói: "' + target.en.split('(')[0].trim() + '"';
  SP_REC.onresult = e => {
    const candidates = Array.from(e.results[0]).map(r => r.transcript.toLowerCase().trim());
    SP_ACTIVE = false;
    if (btn) { btn.textContent = '🎤 Nói ngay'; btn.style.background = ''; }
    document.getElementById('sp-status').textContent = '';
    showSpeakAnalysis(candidates, target);
  };
  SP_REC.onerror = e => {
    SP_ACTIVE = false;
    if (btn) { btn.textContent = '🎤 Nói ngay'; btn.style.background = ''; }
    const st = document.getElementById('sp-status');
    if (!st) return;
    if (e.error === 'aborted') {
      st.textContent = '⚠️ Bị gián đoạn — nhấn 🎤 thử lại';
    } else if (e.error === 'not-allowed') {
      st.textContent = '🔒 Chưa cho phép mic — Cài đặt → Safari → Microphone → Cho phép';
    } else if (e.error === 'no-speech') {
      st.textContent = '🔇 Không nghe thấy — nói to hơn và thử lại';
    } else {
      st.textContent = '❌ Lỗi: ' + e.error + ' — thử lại';
    }
  };
  SP_REC.onend = () => {
    if (SP_ACTIVE) {
      SP_ACTIVE = false;
      if (btn) { btn.textContent = '🎤 Nói ngay'; btn.style.background = ''; }
      const st = document.getElementById('sp-status');
      if (st && !st.textContent) st.textContent = '🔇 Chưa nghe được — nhấn lại và nói rõ hơn';
    }
  };
  try { SP_REC.start(); } catch(e) {
    SP_ACTIVE = false;
    if (btn) { btn.textContent = '🎤 Nói ngay'; btn.style.background = ''; }
    const st = document.getElementById('sp-status');
    if (st) st.textContent = '⚠️ Không mở được mic — thử lại sau 1 giây';
    setTimeout(startSpeakPrac, 1200);
  }
}

function stopSpeakPrac() { SP_ACTIVE = false; if (SP_REC) try { SP_REC.stop(); } catch {} }

function showSpeakAnalysis(candidates, target) {
  const el = document.getElementById('sp-analysis');
  if (!el) return;
  const best = candidates[0];
  const score = pronScore(best, target.en);
  // Word-level analysis
  const tWords = target.en.toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean);
  const hWords = best.replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean);
  // Syllable-ish comparison
  const wordResults = tWords.map((tw, i) => {
    const hw = hWords[i] || '';
    const ok = lev(tw, hw) <= Math.max(1, Math.floor(tw.length * 0.3));
    return { target: tw, heard: hw, ok };
  });
  const errWords = wordResults.filter(w => !w.ok);
  const scoreColor = score >= 88 ? 'var(--gl)' : score >= 62 ? 'var(--al)' : '#E06040';
  const emoji = score >= 88 ? '🏆' : score >= 62 ? '👍' : '💪';

  // Specific hints for errors
  const hints = [];
  errWords.forEach(w => {
    if (!w.heard) {
      hints.push({ icon: '🔇', text: `Từ "<strong>${w.target}</strong>" chưa nghe được — cố nói rõ hơn` });
    } else if (w.target.endsWith('ing') && !w.heard.endsWith('ing')) {
      hints.push({ icon: '📢', text: `"<strong>${w.target}</strong>": nhớ phát âm đuôi <strong>-ing</strong> rõ ràng` });
    } else if (w.target.endsWith('tion') || w.target.endsWith('sion')) {
      hints.push({ icon: '📢', text: `"<strong>${w.target}</strong>": đuôi <strong>-tion/-sion</strong> đọc là /ʃən/` });
    } else if (w.target.length > 8) {
      hints.push({ icon: '🔤', text: `"<strong>${w.target}</strong>" → bạn nói "<em>${w.heard||'(trống)'}</em>" — luyện từng âm tiết` });
    } else {
      hints.push({ icon: '🔤', text: `"<strong>${w.target}</strong>" → bạn nói "<em>${w.heard||'(trống)'}</em>"` });
    }
  });
  if (score >= 88) hints.push({ icon: '🎉', text: 'Phát âm xuất sắc! Tiếp tục phong độ này.' });
  else if (errWords.length === 0 && score >= 62) hints.push({ icon: '⭐', text: 'Gần đúng rồi! Luyện thêm sẽ chuẩn hơn.' });

  el.innerHTML = `<div class="pron-analysis">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div><div style="font-size:.68rem;color:var(--t3)">Bạn nói: "<em style="color:var(--t2)">${best}</em>"</div>
        <div style="font-size:.68rem;color:var(--t3);margin-top:2px">Mục tiêu: "<span style="color:var(--c)">${target.en}</span>"</div>
      </div>
      <div style="text-align:right"><div style="font-size:1.8rem;font-weight:900;color:${scoreColor};line-height:1">${emoji} ${score}%</div></div>
    </div>
    <div class="pron-word-cmp">
      ${wordResults.map(w => `<div class="ph-syl ${w.ok?'ph-ok':'ph-err'}">
        <span class="ph-syl-top">${w.target}</span>
        <span class="ph-syl-bot">${w.ok?'✓':w.heard||'✗'}</span>
      </div>`).join('')}
    </div>
    ${hints.length ? `<div class="ph-hint-row">${hints.slice(0,3).map(h=>`<div class="ph-hint"><span class="ph-hint-ic">${h.icon}</span><span>${h.text}</span></div>`).join('')}</div>` : ''}
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-s btn-sm" onclick="tts('${target.en.replace(/'/g,"\\'")}')">🔊 Nghe lại</button>
      <button class="btn btn-p btn-sm" onclick="document.getElementById('sp-analysis').innerHTML='';startSpeakPrac()">🔄 Thử lại</button>
    </div>
  </div>`;

  if (score >= 88) triggerSuccess('🏆');
  else if (score >= 62) triggerSuccess('👍');
  saveProg(CUR_DAY, { lastPronScore: score });
  PRON_HIST.unshift({ word: target.en, heard: best, score, date: Date.now() });
  if (PRON_HIST.length > 100) PRON_HIST.pop();
  S.set('ph', PRON_HIST);
}

function analyzeGrammar(text) {
  const errors = [];
  const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 3);
  
  // Rule-based grammar checks
  const rules = [
    // Subject-verb agreement
    { re: /\b(the pig|the sow|the boar|the herd|it|this|that)\s+(are|were|have)\b/gi, msg: 'Chủ ngữ số ít nhưng động từ số nhiều', fix: m => m.replace(/\bare\b/,'is').replace(/\bwere\b/,'was').replace(/\bhave\b/,'has') },
    // Missing article
    { re: /\b(pig|sow|boar|farm|virus|disease|vaccine|treatment)\b(?!\s+of|\s+is|\s+are|\s+that)/gi, check: (m, ctx) => !/\b(a|an|the|this|that|each|every|my|your|their|its)\s+\w+$/.test(ctx.slice(0, ctx.indexOf(m))), msg: 'Có thể thiếu mạo từ "a/an/the" trước danh từ này', fix: m => 'the ' + m },
    // Double negation
    { re: /\bnot\b.{1,20}\bnot\b/gi, msg: 'Kiểm tra phủ định kép (double negation)', fix: null },
    // Wrong preposition patterns
    { re: /\bdepend\s+of\b/gi, msg: '"depend of" → dùng "depend on"', fix: m => m.replace('of','on') },
    { re: /\bsick\s+of\b(?!\s+something|\s+it)/gi, msg: 'Kiểm tra: "sick of" hay "sick with" (bị bệnh)?', fix: null },
    // Capitalization of proper terms
    { re: /\bprrs\b/g, msg: 'PRRS nên viết hoa toàn bộ', fix: () => 'PRRS' },
    { re: /\bpcv2?\b/gi, msg: 'PCV2 nên viết hoa', fix: () => 'PCV2' },
    { re: /\basf\b/g, msg: 'ASF nên viết hoa toàn bộ', fix: () => 'ASF' },
    // Common errors
    { re: /\ban\s+unique\b/gi, msg: '"an unique" → dùng "a unique" (unique bắt đầu bằng âm /juː/)', fix: () => 'a unique' },
    { re: /\bmore\s+better\b/gi, msg: '"more better" → chỉ dùng "better"', fix: () => 'better' },
    { re: /\bless\s+worse\b/gi, msg: '"less worse" → dùng "better" hoặc "less severe"', fix: null },
    { re: /\bi\s+am\s+agree\b/gi, msg: '"I am agree" → dùng "I agree"', fix: () => 'I agree' },
    { re: /\bcomplex\s+of\b/gi, msg: 'Kiểm tra: "complex of" hay "complex in"?', fix: null },
  ];

  rules.forEach(rule => {
    let match;
    const re = new RegExp(rule.re.source, rule.re.flags.includes('g') ? rule.re.flags : rule.re.flags + 'g');
    while ((match = re.exec(text)) !== null) {
      const suggestion = rule.fix ? rule.fix(match[0]) : null;
      errors.push({ bad: match[0], good: suggestion, why: rule.msg, pos: match.index });
      if (errors.length >= 5) break;
    }
  });

  // Positive patterns (good writing markers)
  const goodPatterns = [
    /\b(therefore|furthermore|however|moreover|consequently|in addition|as a result)\b/i,
    /\b(in order to|due to|as a result of|in contrast to)\b/i,
    /\b(it is|there is|there are)\b/i,
    /\b(should|must|can|may|might|would)\b/i,
  ];
  const goodCount = goodPatterns.filter(p => p.test(text)).length;

  // Scores
  const wordCount = text.split(/\s+/).filter(w=>w.length>1).length;
  const sentenceCount = sentences.length;
  const errPenalty = Math.min(errors.length * 12, 40);
  const lengthBonus = Math.min(wordCount / 3, 30);
  const goodBonus = goodCount * 5;
  const grammarScore = Math.max(10, Math.min(100, 70 + goodBonus - errPenalty));
  const vocabScore = Math.max(20, Math.min(100, 60 + lengthBonus + goodBonus));
  const fluencyScore = sentenceCount >= 3 ? Math.min(100, 70 + goodBonus) : 55;
  const overall = Math.round((grammarScore + vocabScore + fluencyScore) / 3);

  return { errors, grammarScore: Math.round(grammarScore), vocabScore: Math.round(vocabScore), fluencyScore: Math.round(fluencyScore), overall, wordCount, goodCount };
}

      <div class="wg-score-box"><div class="wg-score-v" style="color:${res.vocabScore>=70?'var(--gl)':'var(--al)'}">${res.vocabScore}</div><div class="wg-score-l">Từ vựng</div></div>
      <div class="wg-score-box"><div class="wg-score-v" style="color:${res.fluencyScore>=70?'var(--gl)':'var(--al)'}">${res.fluencyScore}</div><div class="wg-score-l">Lưu loát</div></div>
    </div>

    }
    ${res.goodCount > 0 ? `<div class="wg-ok">✨ Dùng ${res.goodCount} liên từ/cụm từ học thuật — rất tốt!</div>` : '<div style="font-size:.75rem;color:var(--t3);margin-top:8px">💡 Thêm liên từ (however, therefore, furthermore) để nâng cao điểm.</div>'}
  </div>`;
  if (res.overall >= 80) triggerSuccess('🏆');

}

// ════════════════════════════════════════════════════════════
// SUCCESS EFFECTS (sound + animation)
// ════════════════════════════════════════════════════════════
function triggerSuccess(emoji) {
  // Visual
  const ring = document.createElement('div');
  ring.className = 'success-ring'; ring.textContent = emoji;
  document.body.appendChild(ring);
  setTimeout(() => ring.remove(), 650);
  // Confetti
  const wrap = document.createElement('div'); wrap.className = 'confetti-wrap';
  const colors = ['#C8761A','#E08B25','#5A8A4A','#70A85E','#F0E6D3','#FFD700'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div'); p.className = 'conf-p';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*30}%;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;animation-delay:${Math.random()*0.4}s;animation-duration:${0.9+Math.random()*0.6}s`;
    wrap.appendChild(p);
  }
  document.body.appendChild(wrap);
  setTimeout(() => wrap.remove(), 1800);
  // Sound (Web Audio API)
  playSuccessSound(emoji === '🏆' ? 'perfect' : 'good');
}

function playSuccessSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = type === 'perfect' ? [523,659,784,1047] : [523,659,784];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc.start(t); osc.stop(t + 0.4);
    });
  } catch(e) {}
}

// BOOT
// ════════════════════════════════════════════════════════════
function boot() {
  injectManifest(); registerSW();
  // TTS voices
  if (window.speechSynthesis) speechSynthesis.getVoices();
  // Nav
  document.querySelectorAll('.ni').forEach(btn => btn.addEventListener('click', () => goPage(btn.dataset.p)));
  // Header buttons
  document.getElementById('hdr-tts')?.addEventListener('click', () => { const v = DAY_MAP[CUR_DAY]?.vocab[0]; if (v) tts(v.en + '. ' + v.vi); });
  document.getElementById('hdr-streak')?.addEventListener('click', () => showToast('🔥 Streak hiện tại: ' + STREAK.cur + ' ngày · Kỷ lục: ' + STREAK.lng + ' ngày', 'info'));
  // Onboarding
  if (!USER_NAME) {
    document.getElementById('onboard').classList.remove('hidden');
    document.getElementById('ob-next').addEventListener('click', () => {
      const name = document.getElementById('ob-name').value.trim() || 'Học viên';
      USER_NAME = name; S.set('name', name);
      document.getElementById('onboard').classList.add('hidden');
      document.getElementById('hdr-title').textContent = '🐷 ' + name;
      showToast('Chào mừng ' + name + '! Bắt đầu hành trình 90 ngày 🐷');
    });
  } else {
    document.getElementById('onboard').classList.add('hidden');
    document.getElementById('hdr-title').textContent = '🐷 ' + USER_NAME;
  }
  // Resume reminder
  if (SETTINGS.remOn) { Notification.requestPermission().then(p => { if (p === 'granted') scheduleReminder(); }); }
  // Initial page
  renderToday();
}
document.addEventListener('DOMContentLoaded', boot);

</script>
