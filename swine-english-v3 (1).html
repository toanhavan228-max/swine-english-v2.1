<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Swine English">
<meta name="theme-color" content="#1A0F05">
<meta name="description" content="90-day swine veterinary English learning app">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232C1A08'/><text y='75' x='10' font-size='75'>🐷</text></svg>">
<title>Swine English 90</title>
<style>
/* ── TOKENS ─────────────────────────────────────── */
:root{
  --bg:#0F0A04;--bg2:#1A1008;--bg3:#221508;
  --s:#2C1E0A;--s2:#3A2810;--s3:#482F10;
  --a:#C8761A;--al:#E08B25;--ap:rgba(200,118,26,.13);
  --g:#5A8A4A;--gl:#70A85E;--gp:rgba(90,138,74,.13);
  --r:#B84B1E;--rp:rgba(184,75,30,.13);
  --c:#F0E6D3;--c2:#D4C4A8;--c3:#A89070;
  --t:#E8D8BC;--t2:#A89070;--t3:#6A5030;
  --b:rgba(200,118,26,.18);--b2:rgba(200,118,26,.35);
  --nav:62px;--hdr:54px;
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
}
/* ── RESET ───────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--a);border-radius:2px}

/* ── HEADER ──────────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--hdr);padding-top:env(safe-area-inset-top);
  background:rgba(26,16,8,.95);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b);
  display:flex;align-items:center;padding:0 14px;gap:10px
}
#hdr-pig{font-size:26px;line-height:1;flex-shrink:0}
#hdr-info{flex:1;min-width:0}
#hdr-title{font-size:.93rem;font-weight:700;color:var(--c);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#hdr-sub{font-size:.62rem;color:var(--a);font-weight:600;letter-spacing:.06em;margin-top:1px}
.hbtn{width:34px;height:34px;border-radius:50%;
  background:var(--s);border:1px solid var(--b);
  color:var(--c2);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s}
.hbtn:active{background:var(--s2)}

/* ── BOTTOM NAV ──────────────────────────────────── */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:rgba(26,16,8,.97);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--b);display:flex
}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;background:none;border:none;color:var(--t3);
  font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  border-top:2px solid transparent;transition:all .15s;padding:6px 2px}
.ni.on{color:var(--a);border-top-color:var(--a)}
.ni-ic{font-size:20px;transition:transform .15s}
.ni.on .ni-ic{transform:scale(1.12)}

/* ── PAGES ───────────────────────────────────────── */
.pg{display:none;
  padding:calc(var(--hdr) + env(safe-area-inset-top) + 12px) 14px
          calc(var(--nav) + env(safe-area-inset-bottom) + 16px);
  animation:pi .22s ease;min-height:100vh}
.pg.on{display:block}
@keyframes pi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* ── CARD ────────────────────────────────────────── */
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--r12);padding:14px;margin-bottom:11px}
.card-a{border-color:var(--a)}
.card-g{border-color:var(--g)}
.card-r{border-color:var(--r)}

/* ── BUTTONS ─────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;
  padding:9px 15px;border-radius:var(--r8);border:none;
  font-size:.86rem;font-weight:600;cursor:pointer;
  transition:all .15s;font-family:inherit}
.btn-p{background:var(--a);color:#1A0800}
.btn-p:active{background:var(--al);transform:scale(.97)}
.btn-o{background:none;color:var(--a);border:1px solid var(--a)}
.btn-o:active{background:var(--ap)}
.btn-s{background:var(--s2);color:var(--c2);border:1px solid var(--b)}
.btn-s:active{background:var(--s3)}
.btn-sm{padding:6px 11px;font-size:.78rem}
.btn-lg{padding:12px 20px;font-size:.95rem}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.38;cursor:default}

/* ── PROGRESS ────────────────────────────────────── */
.pb{background:var(--bg3);border-radius:99px;overflow:hidden}
.pb-f{height:100%;background:linear-gradient(90deg,var(--a),var(--al));
  border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── PILLS ───────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
  font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer}
.pill-a{background:var(--ap);color:var(--a);border:1px solid var(--b2)}
.pill-on{background:var(--a);color:#1A0800;border:1px solid var(--a)}
.pill-g{background:var(--gp);color:var(--gl);border:1px solid var(--g)}

/* ── LESSON BLOCKS ───────────────────────────────── */
.blk{background:var(--s);border:1px solid var(--b);border-radius:var(--r12);margin-bottom:9px;overflow:hidden}
.blk-h{display:flex;align-items:center;gap:9px;padding:13px 14px;cursor:pointer;user-select:none}
.blk-ic{font-size:19px;flex-shrink:0}
.blk-ttl{flex:1;font-size:.89rem;font-weight:600;color:var(--c)}
.blk-tm{font-family:monospace;font-size:.68rem;color:var(--a);flex-shrink:0}
.blk-arr{color:var(--t3);font-size:10px;transition:transform .22s;flex-shrink:0}
.blk.open .blk-arr{transform:rotate(90deg)}
.blk-bd{max-height:0;overflow:hidden;transition:max-height .3s ease}
.blk.open .blk-bd{max-height:99999px}
.blk-in{padding:0 14px 14px}

/* ── VOCAB ITEMS ─────────────────────────────────── */
.vi{background:var(--s);border:1px solid var(--b);border-left:3px solid var(--a);
  border-radius:var(--r8);padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.vi.open{border-color:var(--a)}
.vi-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.vi-en{font-family:'SF Mono',Monaco,monospace;font-size:.91rem;font-weight:700;color:var(--c)}
.vi-pron{font-size:.71rem;color:var(--a);margin:2px 0}
.vi-vn{font-size:.81rem;color:var(--t2)}
.vi-ex{font-size:.77rem;color:var(--t3);font-style:italic;
  margin-top:8px;padding-top:8px;border-top:1px dashed var(--b);
  line-height:1.55;display:none}
.vi.open .vi-ex{display:block}
.tts-ic{background:none;border:none;color:var(--a);font-size:17px;cursor:pointer;padding:0 3px;flex-shrink:0}

/* ── CHECK BTN ───────────────────────────────────── */
.chk{display:flex;align-items:center;gap:8px;background:none;border:none;
  cursor:pointer;color:var(--t3);font-size:.84rem;font-weight:600;
  padding:8px 0;font-family:inherit;margin-top:6px;transition:color .2s}
.chk.done{color:var(--gl)}
.chk-c{width:22px;height:22px;border-radius:50%;border:2px solid var(--b2);
  display:flex;align-items:center;justify-content:center;font-size:12px;
  flex-shrink:0;transition:all .2s}
.chk.done .chk-c{background:var(--g);border-color:var(--g);color:#fff}

/* ── QUIZ OPTIONS ────────────────────────────────── */
.qo{width:100%;text-align:left;padding:11px 14px;border-radius:var(--r8);
  background:var(--s);border:1px solid var(--b);color:var(--t);
  font-size:.86rem;cursor:pointer;margin-bottom:7px;
  font-family:inherit;font-weight:500;transition:all .15s}
.qo:disabled{cursor:default}
.qo.correct{background:var(--gp);border-color:var(--g);color:var(--gl)}
.qo.wrong{background:var(--rp);border-color:var(--r);color:#E06040}

/* ── FLASHCARD ───────────────────────────────────── */
.fc-wrap{perspective:900px;cursor:pointer;margin-bottom:12px;min-height:180px}
.fc-inner{position:relative;transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.4,.2,.2,1);border-radius:var(--r16);min-height:180px}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;min-height:180px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:var(--r16);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;text-align:center}
.fc-f{background:var(--s);border:1px solid var(--b2)}
.fc-b{background:var(--bg3);border:1px solid var(--g);transform:rotateY(180deg)}

/* ── STATS / HEATMAP ─────────────────────────────── */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.sc{background:var(--s);border:1px solid var(--b);border-radius:var(--r12);padding:13px;text-align:center}
.sv{font-size:1.75rem;font-weight:900;color:var(--a);line-height:1}
.sl{font-size:.65rem;color:var(--t2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.hm{display:flex;flex-wrap:wrap;gap:3px}
.hm-c{width:13px;height:13px;border-radius:3px;cursor:default}

/* ── PRONUNCIATION ───────────────────────────────── */
.pron-card{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r16);padding:18px;margin-bottom:11px}
.pron-word{font-family:'SF Mono',Monaco,monospace;font-size:1.35rem;font-weight:900;color:var(--c);text-align:center;margin-bottom:4px}
.pron-ipa{font-size:.8rem;color:var(--a);text-align:center;margin-bottom:12px}
.mic-btn{width:66px;height:66px;border-radius:50%;border:3px solid var(--a);
  background:var(--s);font-size:28px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;margin:0 auto 10px;transition:all .2s;position:relative}
.mic-btn.rec{background:var(--rp);border-color:var(--r);animation:pulse .7s ease infinite alternate}
.mic-btn.rec::after{content:'';position:absolute;inset:-8px;border-radius:50%;
  border:2px solid var(--r);animation:ripple 1s ease infinite}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.07)}}
@keyframes ripple{from{transform:scale(1);opacity:.6}to{transform:scale(1.45);opacity:0}}
.pron-status{text-align:center;font-size:.8rem;color:var(--t2);min-height:18px;margin-bottom:8px}
.pron-res{border-radius:var(--r12);padding:13px;text-align:center;margin-top:10px;display:none}
.pron-res.show{display:block}
.pron-score{font-size:2.1rem;font-weight:900;margin-bottom:4px}
.res-perfect{background:var(--gp);border:1px solid var(--g)}
.res-good{background:var(--ap);border:1px solid var(--a)}
.res-try{background:var(--rp);border:1px solid var(--r)}
.cmp-row{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-top:5px}
.cmp-c{font-family:monospace;font-size:.93rem;padding:1px 3px;border-radius:3px}
.cmp-ok{color:var(--gl);background:var(--gp)}
.cmp-bad{color:#E06040;background:var(--rp);text-decoration:underline}

/* ── ONBOARDING ──────────────────────────────────── */
#onboard{position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;text-align:center}
#onboard.hidden{display:none}
.ob-pig{font-size:72px;margin-bottom:16px;animation:bounce .7s ease infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.ob-title{font-size:1.5rem;font-weight:900;color:var(--c);margin-bottom:8px}
.ob-sub{font-size:.9rem;color:var(--t2);line-height:1.6;margin-bottom:28px}
.ob-input{width:100%;padding:14px 16px;background:var(--s);border:1px solid var(--b2);
  border-radius:var(--r12);color:var(--c);font-size:1rem;outline:none;
  text-align:center;margin-bottom:14px;font-family:inherit}
.ob-input:focus{border-color:var(--a)}
.ob-steps{display:flex;gap:6px;margin-bottom:24px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--s3)}
.ob-dot.on{background:var(--a);width:24px}

/* ── SETTINGS ────────────────────────────────────── */
.set-row{display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;border-bottom:1px solid var(--b)}
.set-row:last-child{border-bottom:none}
.set-lbl{font-size:.9rem;color:var(--t)}
.set-desc{font-size:.72rem;color:var(--t2);margin-top:2px}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--s2);
  border:1px solid var(--b);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--a);border-color:var(--a)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;
  border-radius:50%;background:#fff;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* ── TOAST ───────────────────────────────────────── */
#toast{position:fixed;top:calc(var(--hdr) + env(safe-area-inset-top) + 8px);
  left:14px;right:14px;z-index:999;
  background:var(--s2);border:1px solid var(--g);border-radius:var(--r12);
  padding:11px 15px;font-size:.85rem;color:var(--t);
  text-align:center;display:none;box-shadow:0 6px 24px rgba(0,0,0,.7);
  animation:toastIn .25s ease}
#toast.err{border-color:var(--r)}
#toast.info{border-color:var(--a)}
@keyframes toastIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* ── HERO ────────────────────────────────────────── */
.hero{background:linear-gradient(135deg,var(--s) 0%,var(--bg3) 100%);
  border:1px solid var(--b2);border-radius:var(--r16);padding:18px;
  margin-bottom:12px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;
  width:100px;height:100px;border-radius:50%;background:var(--a);opacity:.08}
.hero-wk{font-family:monospace;font-size:.67rem;color:var(--a);font-weight:700;letter-spacing:.08em}
.hero-ttl{font-size:1.2rem;font-weight:900;color:var(--c);margin:4px 0 8px;line-height:1.25}

/* ── SEARCH ──────────────────────────────────────── */
.srch-wrap{position:relative;margin-bottom:12px}
.srch{width:100%;padding:10px 12px 10px 36px;background:var(--s);
  border:1px solid var(--b);border-radius:var(--r8);color:var(--t);
  font-size:.88rem;outline:none;font-family:inherit;transition:border-color .15s}
.srch:focus{border-color:var(--a)}
.srch-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3)}

/* ── TIMELINE ────────────────────────────────────── */
.tl-item{display:flex;gap:11px;padding:9px 12px;border-radius:var(--r8);cursor:pointer;transition:background .15s}
.tl-item:active{background:var(--s2)}
.tl-dot{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:monospace;font-size:.67rem;font-weight:700;
  flex-shrink:0;border:2px solid var(--b)}
.tl-dot.done{background:var(--g);border-color:var(--g);color:#fff}
.tl-dot.today{background:var(--a);border-color:var(--a);color:#1A0800;box-shadow:0 0 10px var(--a)}
.tl-dot.lock{background:var(--s2);color:var(--t3)}

/* ── WEEK ROW ────────────────────────────────────── */
.wk-row{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;
  background:var(--s);border:1px solid var(--b);border-radius:var(--r12);margin-bottom:7px;transition:border-color .15s}
.wk-row.cur{border-color:var(--a)}
.wk-num{width:35px;height:35px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:monospace;font-size:.77rem;font-weight:700;flex-shrink:0}
.wk-info{flex:1;min-width:0}
.wk-ttl{font-size:.87rem;font-weight:600;color:var(--c);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wk-sub{font-size:.7rem;color:var(--t2);margin-top:2px}
.wk-days-wrap{border-radius:0 0 12px 12px;border:1px solid var(--b);border-top:none;
  overflow:hidden;margin-top:-7px;margin-bottom:7px;display:none}
.wk-days-wrap.open{display:block}

/* ── READING ─────────────────────────────────────── */
.reading-box{background:var(--bg3);border:1px solid var(--b);border-radius:var(--r12);padding:14px;margin-bottom:10px}
.reading-txt{font-size:.84rem;color:var(--t2);line-height:1.8}
.reading-txt em{color:var(--al);font-style:normal;font-weight:600}

/* ── SECTION TITLE ───────────────────────────────── */
.sec{font-size:.77rem;font-weight:700;color:var(--t2);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:10px}

/* ── DAY NAV ─────────────────────────────────────── */
.day-nav{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.day-nav button{padding:8px 13px;background:var(--s);border:1px solid var(--b);
  border-radius:var(--r8);color:var(--t2);font-size:.88rem;cursor:pointer;font-family:inherit;transition:all .15s}
.day-nav button:active{background:var(--s2)}
.day-nav-mid{flex:1;text-align:center}
.day-nav-lbl{font-family:monospace;font-size:.65rem;color:var(--t2)}
.day-nav-num{font-size:1.08rem;font-weight:900;color:var(--a)}

/* ── PRON HISTORY ────────────────────────────────── */
.ph-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b)}
.ph-word{font-family:monospace;font-size:.87rem;color:var(--c);flex:1}
.ph-heard{font-size:.7rem;color:var(--t3)}
.ph-score{font-weight:900;font-size:.9rem;flex-shrink:0}

/* ── PRIVACY & LEGAL ─────────────────────────────── */
.legal{font-size:.72rem;color:var(--t3);line-height:1.7;text-align:center;padding:12px 0}

@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
/* ── VOICE SELECTOR ─────────────────────────────────── */
.voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.voice-btn{padding:9px 8px;border-radius:var(--r8);border:1px solid var(--b);background:var(--s);
  color:var(--t2);font-size:.73rem;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit}
.voice-btn.sel{background:var(--ap);border-color:var(--a);color:var(--a)}
.voice-btn:active{transform:scale(.97)}
.voice-name{font-weight:700;display:block;margin-bottom:1px}
.voice-lang{font-size:.62rem;opacity:.7}

/* ── 4-SKILL TABS ───────────────────────────────────── */
.skill-tabs{display:flex;background:var(--s);border:1px solid var(--b);border-radius:var(--r12);
  overflow:hidden;margin-bottom:12px}
.skill-tab{flex:1;padding:10px 2px;border:none;background:none;color:var(--t3);font-size:.68rem;
  font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;border-right:1px solid var(--b);
  transition:all .15s;font-family:inherit}
.skill-tab:last-child{border-right:none}
.skill-tab.on{background:var(--a);color:#1A0800}
.skill-tab-ic{font-size:17px}

/* ── PRONUNCIATION ANALYSIS ─────────────────────────── */
.pron-analysis{border-radius:var(--r12);padding:13px;margin-top:10px;background:var(--bg3);border:1px solid var(--b)}
.pron-word-cmp{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0;justify-content:center}
.ph-syl{display:inline-flex;flex-direction:column;align-items:center;gap:1px;padding:3px 5px;border-radius:5px;min-width:28px}
.ph-syl-top{font-family:monospace;font-size:.82rem;font-weight:700}
.ph-syl-bot{font-size:.58rem;opacity:.8}
.ph-ok{background:var(--gp);color:var(--gl)}
.ph-err{background:var(--rp);color:#E06040}
.ph-hint-row{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.ph-hint{display:flex;align-items:flex-start;gap:7px;font-size:.75rem;padding:6px 8px;
  background:rgba(200,118,26,.08);border-radius:var(--r8);border-left:3px solid var(--a)}

  10: [{"en": "fat-soluble vitamin", "pron": "fæt ˈsɒljʊbəl ˈvɪtəmɪn", "vi": "Vitamin tan trong dầu (A,D,E,K)", "ex": "Fat-soluble vitamins A, D, E, and K accumulate in body fat and can cause toxicity."}, {"en": "phytase", "pron": "ˈfaɪteɪz", "vi": "Enzyme phytase", "ex": "Microbial phytase releases phytate-bound phosphorus, reducing inorganic phosphate supplementation."}, {"en": "iron dextran", "pron": "ˈaɪərn ˈdekstrən", "vi": "Sắt dextran (tiêm heo con)", "ex": "Iron dextran 200 mg IM is administered to piglets at 2–3 days to prevent anemia."}, {"en": "trace mineral", "pron": "treɪs ˈmɪnərəl", "vi": "Khoáng vi lượng (Fe, Zn, Cu, Mn, Se)", "ex": "Organic trace minerals show superior bioavailability compared to inorganic forms."}, {"en": "premix", "pron": "ˈpriːmɪks", "vi": "Premix vitamin-khoáng", "ex": "A vitamin-mineral premix is typically included at 0.25–0.5% of the complete diet."}, {"en": "bioavailability", "pron": "ˌbaɪoʊəˌveɪləˈbɪlɪti", "vi": "Độ khả dụng sinh học", "ex": "The bioavailability of zinc oxide at pharmacological doses reduces post-weaning diarrhea."}, {"en": "calcium phosphorus ratio", "pron": "ˈkælsiəm ˈfɒsfərəs ˈreɪʃioʊ", "vi": "Tỷ lệ Ca:P", "ex": "A dietary calcium to phosphorus ratio of 1.2:1 to 1.5:1 supports optimal bone mineralization."}, {"en": "vitamin E selenium", "pron": "ˈvɪtəmɪn iː ˈselɪniəm", "vi": "Vitamin E và Selenium", "ex": "Vitamin E and selenium synergistically protect cell membranes from oxidative damage."}],
  11: [{"en": "soybean meal", "pron": "ˈsɔɪbiːn miːl", "vi": "Khô đậu nành (SBM)", "ex": "Soybean meal (48% crude protein) is the primary protein ingredient in swine diets."}, {"en": "least-cost formulation", "pron": "liːst kɒst ˌfɔːrmjʊˈleɪʃən", "vi": "Công thức chi phí tối thiểu", "ex": "Linear programming achieves least-cost formulation while meeting all nutrient constraints."}, {"en": "DDGS", "pron": "diː-diː-dʒiː-es", "vi": "Bã rượu khô có cặn (DDGS)", "ex": "DDGS can replace up to 20% of the corn-SBM diet without impairing pig performance."}, {"en": "pellet", "pron": "ˈpelɪt", "vi": "Thức ăn viên nén", "ex": "Pelleting improves feed efficiency by 5–10% compared to mash form."}, {"en": "anti-nutritional factor", "pron": "ˌænti njuːˈtrɪʃənəl ˈfæktər", "vi": "Yếu tố kháng dinh dưỡng", "ex": "Trypsin inhibitors in raw soybeans are anti-nutritional factors destroyed by proper toasting."}, {"en": "fishmeal", "pron": "ˈfɪʃmiːl", "vi": "Bột cá", "ex": "High-quality fishmeal improves palatability and amino acid balance in starter diets."}, {"en": "palatability", "pron": "ˌpælətəˈbɪlɪti", "vi": "Tính ngon miệng của thức ăn", "ex": "Palatability is especially critical in starter diets to maximize post-weaning feed intake."}, {"en": "ingredient matrix", "pron": "ɪnˈɡriːdiənt ˈmeɪtrɪks", "vi": "Bảng giá trị dinh dưỡng nguyên liệu", "ex": "An accurate ingredient matrix is essential for reliable least-cost diet formulation."}],
  12: [{"en": "phase feeding", "pron": "feɪz ˈfiːdɪŋ", "vi": "Cho ăn theo giai đoạn", "ex": "Phase feeding adjusts nutrient density to match the changing requirements of growing pigs."}, {"en": "creep feed", "pron": "kriːp fiːd", "vi": "Thức ăn tập ăn (creep feed)", "ex": "Creep feed offered from day 7 eases the post-weaning dietary transition."}, {"en": "gestation diet", "pron": "dʒeˈsteɪʃən ˈdaɪɪt", "vi": "Khẩu phần heo nái mang thai", "ex": "Gestating sows are typically restricted to 2.0–2.5 kg/day of gestation diet."}, {"en": "lactation diet", "pron": "lækˈteɪʃən ˈdaɪɪt", "vi": "Khẩu phần heo nái nuôi con", "ex": "Lactation diets are fed ad libitum to maximize milk production and minimize body weight loss."}, {"en": "body condition score", "pron": "ˈbɒdi kənˈdɪʃən skɔːr", "vi": "Điểm thể trạng (BCS 1-5)", "ex": "Target body condition score at farrowing is 3.0–3.5 on a five-point scale."}, {"en": "ad libitum", "pron": "æd ˈlɪbɪtəm", "vi": "Cho ăn tự do", "ex": "Nursery and grow-finish pigs are typically managed on an ad libitum feeding system."}, {"en": "flushing", "pron": "ˈflʌʃɪŋ", "vi": "Tăng dinh dưỡng trước phối giống (flushing)", "ex": "Flushing gilts 10–14 days pre-mating can increase ovulation rate and litter size."}, {"en": "backfat thickness", "pron": "ˈbækfæt ˈθɪknəs", "vi": "Độ dày mỡ lưng (P2)", "ex": "Backfat thickness measured at the P2 site objectively assesses sow body condition."}],
  13: [{"en": "probiotic", "pron": "ˌproʊbaɪˈɒtɪk", "vi": "Probiotic (vi sinh vật có lợi)", "ex": "Lactobacillus and Bacillus probiotics improve gut health and reduce post-weaning diarrhea."}, {"en": "acidifier", "pron": "ˈæsɪdɪˌfaɪər", "vi": "Chất axit hóa thức ăn", "ex": "Organic acidifiers reduce gastric pH, inhibiting enteric pathogens in the pig gut."}, {"en": "enzyme supplement", "pron": "ˈenzaɪm ˈsʌplɪmənt", "vi": "Enzyme bổ sung (xylanase, phytase)", "ex": "Non-starch polysaccharide enzymes like xylanase improve digestibility of wheat-based diets."}, {"en": "mycotoxin binder", "pron": "ˈmaɪkəˌtɒksɪn ˈbaɪndər", "vi": "Chất hấp phụ độc tố nấm mốc", "ex": "Montmorillonite clay mycotoxin binders adsorb aflatoxins in the gastrointestinal tract."}, {"en": "zinc oxide", "pron": "zɪŋk ˈɒksaɪd", "vi": "Kẽm oxide liều cao (chống tiêu chảy)", "ex": "High-dose zinc oxide at 2,500–3,000 ppm effectively controls post-weaning diarrhea."}, {"en": "flow rate", "pron": "floʊ reɪt", "vi": "Tốc độ chảy của vú nước", "ex": "Nipple drinker flow rates of 1.0–1.5 L/min are appropriate for growing pigs."}, {"en": "water intake", "pron": "ˈwɔːtər ˈɪnteɪk", "vi": "Lượng nước tiêu thụ", "ex": "Lactating sows require 20–30 liters of water per day to maintain milk production."}, {"en": "essential oil", "pron": "ɪˈsenʃəl ɔɪl", "vi": "Tinh dầu thực vật (phụ gia)", "ex": "Thymol and carvacrol essential oils exhibit antimicrobial activity in the swine gut."}],
  14: [{"en": "mycotoxin", "pron": "ˈmaɪkəˌtɒksɪn", "vi": "Độc tố nấm mốc", "ex": "Mycotoxin contamination of feed ingredients is a chronic challenge in tropical regions."}, {"en": "aflatoxin", "pron": "ˌæfləˈtɒksɪn", "vi": "Aflatoxin (gây độc gan)", "ex": "Aflatoxin B1 is a potent hepatotoxin and immunosuppressant; EU limit is 10 ppb."}, {"en": "zearalenone", "pron": "ˌzɪərəˈlenəʊn", "vi": "Zearalenone (độc tố sinh sản)", "ex": "Zearalenone causes hyperestrogenism manifesting as vulvovaginitis in prepubertal gilts."}, {"en": "deoxynivalenol", "pron": "diːˌɒksɪˈnɪvəlenɒl", "vi": "Deoxynivalenol (DON/Vomitoxin)", "ex": "Deoxynivalenol above 1 ppm causes significant feed refusal and vomiting in pigs."}, {"en": "fumonisin", "pron": "fjuːˈmɒnɪsɪn", "vi": "Fumonisin (độc tố phổi)", "ex": "Fumonisin disrupts sphingolipid biosynthesis, causing pulmonary edema in swine."}, {"en": "moisture content", "pron": "ˈmɔɪstʃər ˈkɒntent", "vi": "Độ ẩm của hạt ngũ cốc", "ex": "Grain moisture content above 14% promotes mold growth and mycotoxin production."}, {"en": "rancidity", "pron": "rænˈsɪdɪti", "vi": "Ôi khét (oxi hóa chất béo)", "ex": "Fat rancidity destroys fat-soluble vitamins and produces toxic peroxides."}, {"en": "antioxidant", "pron": "ˌæntiˈɒksɪdənt", "vi": "Chất chống oxy hóa", "ex": "Ethoxyquin and BHA are antioxidants added to feeds to prevent fat rancidity."}],
  15: [{"en": "estrous cycle", "pron": "ˈiːstrəs ˈsaɪkəl", "vi": "Chu kỳ động dục (21 ngày)", "ex": "The sow's estrous cycle averages 21 days with a range of 18–24 days."}, {"en": "standing reflex", "pron": "ˈstændɪŋ ˈriːfleks", "vi": "Phản xạ đứng yên (immobility reflex)", "ex": "The standing reflex in the presence of a boar is the definitive sign of primary estrus."}, {"en": "ovulation", "pron": "ˌɒvjʊˈleɪʃən", "vi": "Rụng trứng", "ex": "Ovulation occurs 35–40 hours after onset of standing estrus in the sow."}, {"en": "anestrus", "pron": "ænˈiːstrəs", "vi": "Vô dục (không động dục)", "ex": "Sows typically return to estrus 4–7 days after weaning of the litter."}, {"en": "weaning-to-estrus interval", "pron": "ˈwiːnɪŋ tuː ˈiːstrəs ˈɪntərvəl", "vi": "Khoảng cách cai sữa–động dục (WEI)", "ex": "Target weaning-to-estrus interval is 4–6 days for high-performing sow herds."}, {"en": "boar exposure", "pron": "bɔːr ɪkˈspoʊʒər", "vi": "Tiếp xúc heo đực", "ex": "Daily boar exposure for 10–15 minutes stimulates and advances estrus in gilts."}, {"en": "pheromone", "pron": "ˈferəmoʊn", "vi": "Pheromone (chất dẫn dụ)", "ex": "Androstenone is the primary boar pheromone responsible for triggering the standing reflex."}, {"en": "farrowing rate", "pron": "ˈfæroʊɪŋ reɪt", "vi": "Tỷ lệ đẻ", "ex": "Target farrowing rate in commercial sow herds is greater than or equal to 85%."}],
  16: [{"en": "semen collection", "pron": "ˈsiːmən kəˈlekʃən", "vi": "Khai thác tinh dịch", "ex": "Semen is collected from boars 2–3 times per week using the gloved-hand technique."}, {"en": "sperm motility", "pron": "spɜːrm moʊˈtɪlɪti", "vi": "Độ linh động tinh trùng", "ex": "Fresh boar semen must have at least 70% progressively motile sperm to be acceptable."}, {"en": "sperm morphology", "pron": "spɜːrm mɔːrˈfɒlədʒi", "vi": "Hình thái tinh trùng", "ex": "Normal sperm morphology should exceed 80% for semen to be used in AI."}, {"en": "semen extender", "pron": "ˈsiːmən ɪkˈstendər", "vi": "Môi trường pha loãng tinh", "ex": "BTS extender maintains semen viability for 3–5 days when stored at 17°C."}, {"en": "catheter", "pron": "ˈkæθɪtər", "vi": "Ống dẫn tinh (AI catheter)", "ex": "The foam-tip catheter is inserted counterclockwise to engage the sow's cervix."}, {"en": "return rate", "pron": "rɪˈtɜːrn reɪt", "vi": "Tỷ lệ động dục trở lại", "ex": "A return rate exceeding 15% indicates problems with AI technique or semen quality."}, {"en": "chilled semen", "pron": "tʃɪld ˈsiːmən", "vi": "Tinh lạnh (bảo quản 17°C)", "ex": "Chilled semen maintains acceptable quality for up to 5 days at 17°C."}, {"en": "frozen semen", "pron": "ˈfroʊzən ˈsiːmən", "vi": "Tinh đông lạnh (lưu trữ -196°C)", "ex": "Frozen semen stored in liquid nitrogen enables long-term preservation of elite genetics."}],
  17: [{"en": "ultrasonography", "pron": "ˌʌltrəsɒˈnɒɡrəfi", "vi": "Siêu âm chẩn đoán thai", "ex": "Pregnancy can be confirmed by real-time ultrasonography from day 21 post-mating."}, {"en": "embryonic mortality", "pron": "ˌembriˈɒnɪk mɔːrˈtælɪti", "vi": "Chết phôi thai", "ex": "Natural embryonic mortality reduces potential litter size by 30–40% in fertile sows."}, {"en": "progesterone", "pron": "proʊˈdʒestəroʊn", "vi": "Progesterone (duy trì thai)", "ex": "Progesterone from the corpora lutea is essential for pregnancy maintenance."}, {"en": "mummified fetus", "pron": "ˈmʌmɪfaɪd ˈfiːtəs", "vi": "Thai khô (thai bị chết và mummify)", "ex": "Mummified fetuses result from fetal death after day 30–35 of gestation."}, {"en": "gestation length", "pron": "dʒeˈsteɪʃən leŋθ", "vi": "Thời gian mang thai (114 ngày)", "ex": "Average gestation length in swine is 114 days — remembered as 3 months, 3 weeks, 3 days."}, {"en": "farrowing crate", "pron": "ˈfæroʊɪŋ kreɪt", "vi": "Lồng đẻ (farrowing crate)", "ex": "Sows are moved to farrowing crates 5–7 days before expected parturition."}, {"en": "colostrum", "pron": "kəˈlɒstrəm", "vi": "Sữa đầu (colostrum)", "ex": "Colostrum intake of at least 200 mL per piglet is critical for passive immunity."}, {"en": "implantation", "pron": "ˌɪmplænˈteɪʃən", "vi": "Gắn phôi vào tử cung (implantation)", "ex": "Embryo implantation in swine occurs between days 12 and 18 of gestation."}],
  18: [{"en": "parturition", "pron": "ˌpɑːrtjʊˈrɪʃən", "vi": "Sự đẻ (parturition)", "ex": "Parturition in the sow normally lasts 2–4 hours for delivery of the entire litter."}, {"en": "dystocia", "pron": "dɪˈstoʊʃiə", "vi": "Đẻ khó (dystocia)", "ex": "Dystocia requiring obstetrical assistance occurs in approximately 1–5% of farrowings."}, {"en": "oxytocin", "pron": "ˌɒksɪˈtoʊsɪn", "vi": "Oxytocin (hormone kích đẻ)", "ex": "Oxytocin at 10–20 IU IM stimulates uterine contractions during prolonged farrowing."}, {"en": "placenta", "pron": "pləˈsentə", "vi": "Nhau thai", "ex": "The placenta should be expelled within 4 hours of the last piglet being born."}, {"en": "cross-fostering", "pron": "ˈkrɒs ˈfɒstərɪŋ", "vi": "Ghép heo con (cross-fostering)", "ex": "Cross-fostering within 24 hours of birth balances litter sizes across sows."}, {"en": "split suckling", "pron": "splɪt ˈsʌklɪŋ", "vi": "Cho bú luân phiên (split suckling)", "ex": "Split suckling ensures that all piglets receive adequate colostrum from each sow."}, {"en": "teat order", "pron": "tiːt ˈɔːrdər", "vi": "Thứ tự bú vú (teat order)", "ex": "Piglets establish a teat order through competition within the first 24 hours."}, {"en": "pre-weaning mortality", "pron": "priː ˈwiːnɪŋ mɔːrˈtælɪti", "vi": "Tỷ lệ chết trước cai sữa (PWM)", "ex": "Target pre-weaning mortality in well-managed commercial farms is less than 10%."}],
  19: [{"en": "milk letdown", "pron": "mɪlk ˈletdaʊn", "vi": "Phóng sữa (milk letdown)", "ex": "Milk letdown occurs every 40–60 minutes and lasts only 15–30 seconds per nursing."}, {"en": "agalactia", "pron": "ˌeɪɡəˈlæktiə", "vi": "Mất sữa (agalactia)", "ex": "MMA syndrome causes agalactia within 12–72 hours post-farrowing."}, {"en": "mastitis", "pron": "mæˈstaɪtɪs", "vi": "Viêm vú (mastitis)", "ex": "Clinical mastitis presents as a swollen, hot, hard, and painful mammary gland."}, {"en": "metritis", "pron": "mɪˈtraɪtɪs", "vi": "Viêm tử cung (metritis)", "ex": "Post-partum metritis causes mucopurulent vulvar discharge and systemic illness."}, {"en": "MMA syndrome", "pron": "em-em-eɪ ˈsɪndrəʊm", "vi": "Hội chứng viêm vú-tử cung-mất sữa", "ex": "MMA syndrome is the most common cause of neonatal piglet mortality in the first week."}, {"en": "post-weaning diarrhea", "pron": "poʊst ˈwiːnɪŋ daɪəˈrɪə", "vi": "Tiêu chảy sau cai sữa (PWD)", "ex": "ETEC-associated post-weaning diarrhea is the leading enteric disease in swine nurseries."}, {"en": "lactation length", "pron": "lækˈteɪʃən leŋθ", "vi": "Thời gian nuôi con", "ex": "Commercial farms typically wean at 21–28 days to maximize sow productivity."}, {"en": "weaning stress", "pron": "ˈwiːnɪŋ stres", "vi": "Stress cai sữa", "ex": "Weaning causes multifactorial stress, predisposing piglets to enteric and respiratory disease."}],
  20: [{"en": "pigs weaned per sow per year", "pron": "pɪɡz wiːnd pɜːr saʊ pɜːr jɪər", "vi": "Số heo cai sữa/nái/năm (PSY)", "ex": "Target pigs weaned per sow per year is 28–32 in high-performing commercial herds."}, {"en": "non-productive sow days", "pron": "nɒn prəˈdʌktɪv saʊ deɪz", "vi": "Ngày không sản xuất của nái (NPSD)", "ex": "Target non-productive sow days is less than 30 per year for efficient sow management."}, {"en": "total born", "pron": "ˈtoʊtəl bɔːrn", "vi": "Tổng số con đẻ ra (total born)", "ex": "Total born includes liveborn piglets, stillborn piglets, and mummified fetuses."}, {"en": "born alive", "pron": "bɔːrn əˈlaɪv", "vi": "Số con đẻ ra sống (born alive)", "ex": "Born alive of 13 or more per litter is achievable with modern high-prolific genetics."}, {"en": "stillborn", "pron": "ˈstɪlbɔːrn", "vi": "Chết thai lúc đẻ (stillborn)", "ex": "Stillborn rate exceeding 6% indicates inadequate farrowing supervision."}, {"en": "conception rate", "pron": "kənˈsepʃən reɪt", "vi": "Tỷ lệ thụ thai", "ex": "Overall herd conception rate should exceed 90% with effective estrus detection and AI."}, {"en": "sow replacement rate", "pron": "saʊ rɪˈpleɪsmənt reɪt", "vi": "Tỷ lệ thay thế nái hàng năm", "ex": "Annual sow replacement rate of 40–50% maintains optimal parity distribution."}, {"en": "parity", "pron": "ˈpærɪti", "vi": "Lứa đẻ (số lần đã sinh)", "ex": "Sows typically reach peak litter size at parities 3 through 5."}],
  21: [{"en": "seasonal infertility", "pron": "ˈsiːzənəl ɪnˈfɜːrtɪlɪti", "vi": "Vô sinh theo mùa", "ex": "Seasonal infertility in late summer reduces farrowing rates by 5–15% in tropical herds."}, {"en": "heat stress", "pron": "hiːt stres", "vi": "Stress nhiệt (heat stress)", "ex": "Heat stress above 27°C reduces ovulation rate, embryo survival, and boar semen quality."}, {"en": "abortion storm", "pron": "əˈbɔːrʃən stɔːrm", "vi": "Sóng sẩy thai hàng loạt", "ex": "An abortion storm affecting more than 5% of pregnant sows strongly suggests PRRS infection."}, {"en": "gilt development program", "pron": "ɡɪlt dɪˈveləpmənt ˈproʊɡræm", "vi": "Chương trình phát triển nái hậu bị", "ex": "The gilt development program targets first mating at the third estrus and at least 135 kg."}, {"en": "vulvar discharge", "pron": "ˈvʌlvər ˈdɪstʃɑːrdʒ", "vi": "Khí hư âm hộ", "ex": "Mucopurulent vulvar discharge post-farrowing indicates endometritis or vaginitis."}, {"en": "reproductive failure", "pron": "ˌreprəˈdʌktɪv ˈfeɪljər", "vi": "Thất bại sinh sản", "ex": "PRRS virus is the single most important cause of reproductive failure in commercial swine."}, {"en": "culling criteria", "pron": "ˈkʌlɪŋ kraɪˈtɪəriə", "vi": "Tiêu chí loại thải nái", "ex": "Culling criteria include repeat returns, small litters, lameness, and poor body condition."}, {"en": "wean-to-service interval", "pron": "wiːn tuː ˈsɜːrvɪs ˈɪntərvəl", "vi": "Khoảng cách cai sữa–phối giống", "ex": "Target wean-to-service interval of less than 7 days ensures timely re-mating."}],
  22: [{"en": "PRRS virus", "pron": "piː-ɑːr-ɑːr-es ˈvaɪrəs", "vi": "Virus PRRS", "ex": "PRRS virus causes reproductive failure in sows and respiratory disease in nursery pigs."}, {"en": "virulence", "pron": "ˈvɪrʊləns", "vi": "Độc lực của mầm bệnh", "ex": "Highly virulent PRRS strains cause nursery mortality exceeding 20%."}, {"en": "immunosuppression", "pron": "ˌɪmjʊnoʊsəˈpreʃən", "vi": "Ức chế miễn dịch", "ex": "PRRS-induced immunosuppression predisposes pigs to secondary bacterial infections."}, {"en": "macrophage", "pron": "ˈmækrəfeɪdʒ", "vi": "Đại thực bào", "ex": "PRRS virus replicates within pulmonary alveolar macrophages."}, {"en": "seroprevalence", "pron": "ˌsɪərəʊˈprevələns", "vi": "Tỷ lệ huyết thanh dương tính", "ex": "PRRS seroprevalence exceeds 80% in commercial swine herds worldwide."}, {"en": "modified live vaccine", "pron": "ˈmɒdɪfaɪd laɪv ˈvæksiːn", "vi": "Vaccine nhược độc", "ex": "Modified live PRRS vaccines provide faster immunity than inactivated products."}, {"en": "wild-type strain", "pron": "waɪld taɪp streɪn", "vi": "Chủng hoang dại", "ex": "Wild-type PRRS field strains vary significantly in virulence and pathogenicity."}, {"en": "viremia", "pron": "vaɪˈriːmiə", "vi": "Nhiễm virus huyết", "ex": "PRRS causes persistent viremia lasting 4–6 weeks post-infection."}],
